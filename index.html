<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙物理学シミュレーター v3.2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            background: rgba(10, 10, 20, 0.95); color: #fff;
            padding: 12px; border-radius: 12px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 480px; font-size: 11px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        select, button {
            background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; flex: 1;
        }
        #pauseBtn { background: #cc7700; }
        #resetBtn { background: #aa2222; }
        .sn-mode { color: #55aaff; font-weight: bold; }
        input[type=range] { flex: 2; accent-color: #55aaff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-panel">
    <div class="ui-row">
        <label>🔭 視点</label>
        <select id="targetSelect"><option value="-1">自由視点</option></select>
        <label class="sn-mode">⭐ 進化モード</label>
        <select id="snMode"><option value="on">ON</option><option value="off">OFF</option></select>
    </div>
    <div class="ui-row">
        <label>⚙️ 物理</label>
        <select id="physicsMode">
            <option value="collision">衝突・合体</option>
            <option value="normal">すり抜け</option>
        </select>
        <label>🌞 質量</label>
        <input type="range" id="massRange" min="500" max="10000" value="3000">
    </div>
    <div class="ui-row">
        <label>⏩ 速度</label>
        <input type="range" id="timeRange" min="0" max="3" step="0.1" value="1">
        <button id="pauseBtn">一時停止</button>
        <button id="resetBtn">宇宙リセット</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const targetSelect = document.getElementById('targetSelect');
const snMode = document.getElementById('snMode');
const physicsMode = document.getElementById('physicsMode');
const massInput = document.getElementById('massRange');
const timeInput = document.getElementById('timeRange');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');

let bodies = [];
let effects = [];
let zoom = 0.5;
let offset = { x: 0, y: 0 };
let isDragging = false, startPos = null, currentPos = null;
let lastPinchDist = 0, lastMidPoint = null;
let isPaused = false, bodyCounter = 0;
let supernovaTimer = 0, supernovaActive = false, flashAlpha = 0;
// blackHoleActive, blackHolePos, Particleクラス, stars配列は不要になったため削除

const G = 1;

// 質量に応じて色を返す
function getColorByMass(mass) {
    if (mass < 100) return '#aaaaaa'; // 惑星
    if (mass < 1000) return '#ff6644'; // 赤い星
    if (mass < 5000) return '#ffcc00'; // 黄色（太陽級）
    if (mass < 15000) return '#ffffff'; // 白色
    return '#88ccff'; // 青白い（超巨大星）
}

class Body {
    constructor(x, y, vx, vy, mass, color, name = "天体", hasRings = false) {
        this.id = bodyCounter++;
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.mass = mass;
        this.color = color;
        this.name = name;
        this.hasRings = hasRings;
        this.history = [];
        this.updateRadius();
    }
    updateRadius() { 
        this.radius = Math.max(2, Math.pow(this.mass, 1/3) * 1.5);
        this.color = getColorByMass(this.mass); // 質量が変わるたびに色更新
    }
    update(dt) {
        if (!isPaused) {
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > 50) this.history.shift();
            this.x += this.vx * dt;
            this.y += this.vy * dt;
        }
    }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(1.5, this.radius * zoom);

        if (this.mass >= 50000) { // ブラックホールの描画（インターステラー風）
            // 1. 降着円盤（歪んだ形状）
            ctx.beginPath();
            const ringRadius = this.radius * 3 * zoom;
            ctx.ellipse(sx, sy, ringRadius, ringRadius / 4, 0, 0, Math.PI * 2);
            ctx.ellipse(sx, sy, ringRadius / 4, ringRadius, 0, 0, Math.PI * 2); // 垂直方向の歪み
            ctx.strokeStyle = this.color;
            ctx.lineWidth = sr / 2;
            ctx.globalAlpha = 0.8;
            ctx.stroke();
            ctx.globalAlpha = 1.0;

            // 2. 事象の地平線（黒い球体）
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fillStyle = "#000";
            ctx.fill();

            // 光輪（輝き）
            ctx.shadowBlur = sr * 2;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        } else { // 通常の天体の描画
            // 軌跡
            if (this.history.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = this.color; ctx.globalAlpha = 0.1;
                for (let i = 0; i < this.history.length; i++) {
                    const p = this.history[i];
                    const px = (p.x - offset.x) * zoom + canvas.width / 2;
                    const py = (p.y - offset.y) * zoom + canvas.height / 2;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.stroke(); ctx.globalAlpha = 1.0;
            }
            // 輪っか（土星など）
            if (this.hasRings) {
                ctx.beginPath(); ctx.ellipse(sx, sy, this.radius * 2.5 * zoom, this.radius * 0.8 * zoom, 0.4, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(200, 180, 150, 0.4)"; ctx.lineWidth = 1 * zoom; ctx.stroke();
            }
            // 本体
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.shadowBlur = sr; ctx.shadowColor = this.color; ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
}

class RingEffect {
    constructor(x, y, color, type = "impact") { 
        this.x = x; this.y = y; this.color = color; this.life = 1.0; this.type = type;
    }
    draw() {
        this.life -= 0.02;
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;
        ctx.beginPath();
        const r = this.type === "impact" ? (1.0 - this.life) * 150 * zoom : this.life * 200 * zoom;
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.globalAlpha = 1.0;
    }
}

function initSolarSystem() {
    bodyCounter = 0; supernovaActive = false; // blackHoleActive は不要
    bodies = [new Body(0, 0, 0, 0, 5000, '#ffcc00', "太陽")];
    const data = [
        { d: 80, v: 8.0, m: 5, c: '#aaa', n: "水星" },
        { d: 130, v: 6.2, m: 10, c: '#fda', n: "金星" },
        { d: 190, v: 5.1, m: 10, c: '#4af', n: "地球" },
        { d: 450, v: 3.3, m: 50, c: '#fc9', n: "木星" },
        { d: 650, v: 2.8, m: 40, c: '#eda', n: "土星", r: true }
    ];
    data.forEach(p => {
        const angle = Math.random() * Math.PI * 2;
        bodies.push(new Body(Math.cos(angle)*p.d, Math.sin(angle)*p.d, -Math.sin(angle)*p.v, Math.cos(angle)*p.v, p.m, p.c, p.n, p.r));
    });
    zoom = 0.5; offset = { x: 0, y: 0 }; targetSelect.value = "-1"; updateSelect();
}

function loop() {
    const dt = parseFloat(timeInput.value); // blackHoleActive による速度調整は不要
    
    if (!isPaused) {
        // 重力 & 衝突判定
        for (let i = 0; i < bodies.length; i++) {
            const b1 = bodies[i];
            if (b1.mass >= 50000) { // ブラックホールの場合
                // 全ての天体を吸い込む
                for (let j = 0; j < bodies.length; j++) {
                    if (i === j) continue; // 自分自身は飛ばす
                    const b2 = bodies[j];
                    const dx = b1.x - b2.x; const dy = b1.y - b2.y;
                    const d2 = dx*dx + dy*dy + 5; const d = Math.sqrt(d2);

                    // 吸い込みエフェクト（消失）
                    if (d < b1.radius) {
                        effects.push(new RingEffect(b2.x, b2.y, b2.color, "impact"));
                        bodies.splice(j, 1);
                        updateSelect();
                        // インデックスを調整（要素が削除されたため）
                        if (j < i) i--; j--; 
                        continue;
                    }

                    // ブラックホールへの強力な引力
                    const f = (G * b1.mass * b2.mass) / d2 * 10; // 引力を10倍に強化
                    b2.vx += (f * dx / d) / b2.mass * dt;
                    b2.vy += (f * dy / d) / b2.mass * dt;
                }
                
                // ブラックホール以外の天体がいなくなったらリセット
                if (bodies.length === 1 && bodies[0].mass >= 50000) {
                    flashAlpha = 1.0;
                    initSolarSystem();
                }
            } else { // 通常の天体の場合（既存の重力計算）
                for (let j = i + 1; j < bodies.length; j++) {
                    const b2 = bodies[j];
                    if (b2.mass >= 50000) continue; // ブラックホールは飛ばす

                    const dx = b2.x - b1.x; const dy = b2.y - b1.y;
                    const d2 = dx*dx + dy*dy + 5; const d = Math.sqrt(d2);

                    // 衝突判定（既存）
                    if (physicsMode.value === 'collision' && d < (b1.radius + b2.radius)) {
                        const totalM = b1.mass + b2.mass;
                        b1.vx = (b1.vx*b1.mass + b2.vx*b2.mass)/totalM; b1.vy = (b1.vy*b1.mass + b2.vy*b2.mass)/totalM;
                        b1.x = (b1.x*b1.mass + b2.x*b2.mass)/totalM; b1.y = (b1.y*b1.mass + b2.y*b2.mass)/totalM;
                        b1.mass = totalM; b1.updateRadius();
                        if (!b1.name.endsWith("系")) b1.name += "系";
                        bodies.splice(j, 1); updateSelect(); continue;
                    }

                    // 通常の引力計算（既存）
                    const f = (G * b1.mass * b2.mass) / d2;
                    b1.vx += (f * dx / d) / b1.mass * dt; b1.vy += (f * dy / d) / b1.mass * dt;
                    b2.vx -= (f * dx / d) / b2.mass * dt; b2.vy -= (f * dy / d) / b2.mass * dt;
                }
            }

            // 超新星爆発チェック（既存）
            if (snMode.value === "on" && !supernovaActive && b1.mass >= 50000) {
                supernovaActive = true; supernovaTimer = 10 + Math.random()*10;
            }
        }
    }

    // 超新星爆発後の挙動を修正
    if (supernovaActive && !isPaused) {
        supernovaTimer -= (1/60) * dt;
        if (supernovaTimer <= 0) {
            supernovaActive = false;
            if (Math.random() > 0.1) { // 確率を少し上げる（ブラックホール化）
                // 重力崩壊した天体をブラックホール化（描画で判断するため、特にフラグは不要）
            } else {
                flashAlpha = 1.0;
                initSolarSystem();
            }
        }
    }

    ctx.fillStyle = '#00030a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // ブラックホールイベントの描画ロジックを修正
    // blackHoleActive は不要になる。bodies配列内のブラックホール天体が吸い込みを行うため。
    const targetId = parseInt(targetSelect.value);
    const target = bodies.find(b => b.id === targetId);
    if (target) { offset.x = target.x; offset.y = target.y; }
    bodies.forEach(b => { b.update(dt); b.draw(); });

    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    if (supernovaActive) {
        ctx.fillStyle = "#ff4444"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("⚠️ 重力崩壊まで: " + supernovaTimer.toFixed(1) + "s", canvas.width/2, 50);
    }
    if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0,0,canvas.width, canvas.height); flashAlpha -= 0.05; }
    
    if (isDragging && startPos && currentPos) {
        ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(currentPos.x, currentPos.y);
        ctx.strokeStyle = '#ffff00'; ctx.stroke();
    }
    requestAnimationFrame(loop);
}

function updateSelect() {
    const v = targetSelect.value; targetSelect.innerHTML = '<option value="-1">自由視点</option>';
    bodies.forEach(b => { const o = document.createElement('option'); o.value = b.id; o.textContent = b.name; if(b.id==v) o.selected=true; targetSelect.appendChild(o); });
}

resetBtn.onclick = initSolarSystem;
pauseBtn.onclick = () => { isPaused = !isPaused; pauseBtn.textContent = isPaused ? "再開" : "一時停止"; };
canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { isDragging = true; startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; currentPos = startPos; }
    else if (e.touches.length === 2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastMidPoint = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 }; }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) { currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
    else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        zoom *= (d / lastPinchDist); zoom = Math.min(Math.max(zoom, 0.01), 10); lastPinchDist = d;
        if (targetSelect.value == "-1") { const m = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 }; offset.x -= (m.x - lastMidPoint.x)/zoom; offset.y -= (m.y - lastMidPoint.y)/zoom; lastMidPoint = m; }
    }
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
    if (isDragging && startPos && currentPos) {
        const sx = (startPos.x - canvas.width/2)/zoom + offset.x, sy = (startPos.y - canvas.height/2)/zoom + offset.y;
        bodies.push(new Body(sx, sy, (currentPos.x - startPos.x)*0.05/zoom, (currentPos.y - startPos.y)*0.05/zoom, parseInt(massInput.value), '#fff', "新天体"));
        updateSelect();
    }
    isDragging = false;
});
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
initSolarSystem(); requestAnimationFrame(loop);
</script>
</body>
</html>
