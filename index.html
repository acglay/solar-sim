<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v14.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version { position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4); font-size: 10px; pointer-events: none; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(10, 10, 25, 0.95); color: #fff;
            padding: 12px; border-radius: 16px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 500px; z-index: 100;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .ui-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; }
        .icon-btn { font-size: 18px; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        input[type=range] { flex: 2; accent-color: #00b060; height: 6px; }
        input[type=range]:disabled { opacity: 0.2; }
        label { white-space: nowrap; font-size: 11px; color: #aaa; min-width: 40px; }
    </style>
</head>
<body>
<div id="version">v14.0 Supernova Countdown & Orbit Fade</div>
<canvas id="canvas"></canvas>
<div class="ui-panel" id="panel">
    <div class="ui-row"><select id="targetSelect"><option value="-1">🔭 自由視点</option></select></div>
    <div class="ui-row">
        <select id="launchType">
            <option value="sun">☀️ 太陽</option><option value="mercury">☿️ 水星</option>
            <option value="venus">♀️ 金星</option><option value="earth" selected>🌍 地球</option>
            <option value="mars">♂️ 火星</option><option value="jupiter">♃ 木星</option>
            <option value="saturn">♄ 土星</option><option value="uranus">⛢ 天王星</option>
            <option value="neptune">♆ 海王星</option><option value="pluto">♇ 冥王星</option>
            <option value="blackhole">🕳️ ブラックホール</option>
        </select>
    </div>
    <div class="ui-row">
        <label id="massLabel" style="color: #444;">🌞 質量</label>
        <input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1" disabled>
    </div>
    <div class="ui-row">
        <label>⏩ 時間</label>
        <input type="range" id="timeRange" min="0" max="10" step="0.1" value="1.5">
    </div>
    <div class="ui-grid">
        <button id="pauseBtn" class="icon-btn">⏸️</button>
        <button id="resetBtn" class="icon-btn">🔄</button>
        <button id="randomBtn" class="icon-btn">🌌</button>
        <button id="orbitBtn" class="icon-btn" style="background: #0060b0;">💫</button>
        <button id="labelBtn" class="icon-btn" style="background: #0060b0;">📛</button>
        <button id="debugBtn" class="icon-btn" style="background: #333;">🔍</button>
        <button id="precisionBtn" class="icon-btn" style="background: #00b060;">🎯</button>
        <button id="collisionBtn" class="icon-btn" style="background: #00b060;">⚙️</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');
let bodies = [], particles = [], asteroids = [], backgroundStars = [], nebulae = [], zoom = 0.4, offset = { x: 0, y: 0 }, isDragging = false, startPos = null, isPaused = false, bodyCounter = 0, addedCount = 0, showLabels = true, isHighPrecision = true, showDebug = false, isCollision = true, showOrbits = true, whiteoutAlpha = 0, eventStopped = false, lastPinchDist = 0, inputHandled = false;
const G = 1;

const KANA = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ";
const BASE_NAMES = ["ゼウス", "アエテルナ", "ベスタ", "ノヴァ", "オシリス", "テラ", "プロキシマ", "カシオペア", "リゲル"];

function mutateName(name) {
    let chars = name.split('');
    let mutationCount = Math.max(1, Math.floor(chars.length * 0.2));
    for(let i=0; i<mutationCount; i++) chars[Math.floor(Math.random()*chars.length)] = KANA[Math.floor(Math.random()*KANA.length)];
    return chars.join('');
}

function getSuffix(n) {
    let s = ""; n++;
    while(n > 0) { let m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - m) / 26); }
    return s;
}

const PRESETS = {
    sun: { m: 1000000, c: '#ffcc00', n: "太陽" }, mercury: { m: 0.166, c: '#aaaaaa', n: "水星" },
    venus: { m: 2.447, c: '#ffddaa', n: "金星" }, earth: { m: 3.003, c: '#44aaff', n: "地球" },
    mars: { m: 0.322, c: '#ff6644', n: "火星" }, jupiter: { m: 954.7, c: '#ffcc99', n: "木星" },
    saturn: { m: 285.8, c: '#eeddaa', n: "土星", r: "h" }, uranus: { m: 43.66, c: '#50c878', n: "天王星", r: "h" },
    neptune: { m: 51.51, c: '#120a8f', n: "海王星" }, pluto: { m: 0.006, c: '#ccbbbb', n: "冥王星" },
    blackhole: { m: 10000000, c: '#000', n: "ブラックホール" }
};

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false, isComet = false) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ax = 0; this.ay = 0; this.mass = mass; 
        this.baseColor = color; this.color = color; this.name = name; this.ringType = ringType; this.isMoon = isMoon; this.isComet = isComet;
        this.isAnalytic = isMoon; this.parent = null; this.orbitDist = 0; this.angle = 0;
        this.history = []; this.bhCountdown = -1;
        this.updateProperties();
    }
    updateProperties() {
        if (this.mass >= 20000000 && !this.name.includes("ブラックホール") && this.bhCountdown < 0) {
            this.bhCountdown = 120; // 2 seconds at 60fps
        }
        this.isBlackHole = this.name.includes("ブラックホール");
        this.color = this.isBlackHole ? "#000" : (this.mass > 500000 && !this.isMoon ? (this.mass < 5000000 ? "#ffffff" : "#aaccff") : this.baseColor);
        this.radius = Math.max(1.5, Math.log10(this.mass + 1) * 8 * (this.isBlackHole ? 2.5 : (this.isMoon ? 0.6 : 2.5)));
    }
}

function computePhysics(bodyList, dt) {
    bodyList.forEach(b => { b.oldAx = b.ax; b.oldAy = b.ay; b.ax = 0; b.ay = 0; });
    for (let i = 0; i < bodyList.length; i++) {
        const b1 = bodyList[i];
        for (let j = i + 1; j < bodyList.length; j++) {
            const b2 = bodyList[j], dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx+dy*dy+0.01, d = Math.sqrt(d2), f = (G*b1.mass*b2.mass)/d2;
            b1.ax += (f*dx/d)/b1.mass; b1.ay += (f*dy/d)/b1.mass; b2.ax -= (f*dx/d)/b2.mass; b2.ay -= (f*dy/d)/b2.mass;
        }
        asteroids.forEach((a, idx) => {
            const dx = a.x - b1.x, dy = a.y - b1.y, d = Math.sqrt(dx*dx+dy*dy);
            if (d < b1.radius) asteroids.splice(idx, 1);
        });
    }
    bodyList.forEach(b => {
        if (b.isAnalytic && b.parent) {
            const omega = Math.sqrt((G*(b.parent.mass+b.mass))/Math.pow(b.orbitDist,3)); b.angle += omega*dt;
            b.x = b.parent.x + Math.cos(b.angle)*b.orbitDist; b.y = b.parent.y + Math.sin(b.angle)*b.orbitDist; return;
        }
        b.x += b.vx*dt + 0.5*b.oldAx*dt*dt; b.y += b.vy*dt + 0.5*b.oldAy*dt*dt;
        b.vx += 0.5*(b.oldAx+b.ax)*dt; b.vy += 0.5*(b.oldAy+b.ay)*dt;
    });
    asteroids.forEach(a => { a.ang += a.spd * dt; a.x = Math.cos(a.ang)*a.dist; a.y = Math.sin(a.ang)*a.dist; });
}

function initSolarSystem() {
    bodyCounter = 0; addedCount = 0; bodies = []; asteroids = []; backgroundStars = []; nebulae = [];
    const sun = new Body(0, 0, 0, 0, PRESETS.sun.m, PRESETS.sun.c, "太陽"); bodies.push(sun);
    // Background 20k stars
    for(let i=0; i<20000; i++) backgroundStars.push({ x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4, s: Math.random()*1.2, c: `hsl(${Math.random()*60+200}, 100%, ${Math.random()*30+70}%)` });
    for(let i=0; i<3; i++) nebulae.push({ x: (Math.random()-0.5)*3, y: (Math.random()-0.5)*3, r: 150+Math.random()*250, c: `hsla(${Math.random()*360}, 60%, 40%, 0.04)` });
    const planets = [[387, PRESETS.mercury, []],[723, PRESETS.venus, []],[1000, PRESETS.earth, [[25,0.037,"#b0b0b0","月"]]],[1524, PRESETS.mars, [[12,0.0001,"#b59e8a","フォボス"],[18,0.0001,"#9d8b7a","ダイモス"]]],[5203, PRESETS.jupiter, [[110,0.45,"#e2d06e","イオ"],[150,0.4,"#a0a0a0","エウロパ"],[200,0.7,"#7a7a7a","ガニメデ"],[250,0.5,"#8a7a6a","カリスト"]]],[9537, PRESETS.saturn, [[200,0.65,"#d2a01e","タイタン"],[150,0.1,"#c0c0c0","レア"]]],[19191, PRESETS.uranus, [[120,0.1,"#b0b0b0","チタニア"]]],[30069, PRESETS.neptune, [[220,0.1,"#90a0b0","トリトン"]]],[39482, PRESETS.pluto, []]];
    planets.forEach(p => {
        const d = p[0], pr = p[1], a = Math.random()*Math.PI*2, v = Math.sqrt((G*sun.mass)/d);
        const planet = new Body(Math.cos(a)*d, Math.sin(a)*d, -Math.sin(a)*v, Math.cos(a)*v, pr.m, pr.c, pr.n, pr.r);
        bodies.push(planet);
        p[2].forEach(m => { const moon = new Body(0,0,0,0,m[1],m[2],m[3],null,true); moon.parent = planet; moon.orbitDist = m[0]; moon.angle = Math.random()*Math.PI*2; bodies.push(moon); });
    });
    bodies.push(new Body(6000, 6000, -9, -4, 0.001, "#fff", "ハレー彗星", null, false, true));
    for(let i=0; i<1000; i++) { const dist = 2200 + Math.random()*1100, ang = Math.random()*Math.PI*2; asteroids.push({ dist, ang, spd: Math.sqrt(G*sun.mass/Math.pow(dist,3)), x:0, y:0 }); }
    offset = {x:0, y:0}; updateSelect();
}

function handleGacha() {
    bodyCounter = 0; addedCount = 0; bodies = []; asteroids = [];
    const mode = Math.random() < 0.1 ? (Math.random() < 0.5 ? "A" : "B") : "S";
    let centerBody;
    if (mode === "A") {
        const m = PRESETS.sun.m, d = 600;
        const s1 = new Body(-d/2, 0, 0, 0.5*Math.sqrt(G*2*m/d), m, "#fff", mutateName("ゼウス"));
        const s2 = new Body(d/2, 0, 0, -0.5*Math.sqrt(G*2*m/d), m, "#fff", mutateName("ヘリオス"));
        bodies.push(s1, s2); centerBody = {x:0, y:0, mass: 2*m, vx:0, vy:0};
    } else if (mode === "B") {
        const m1 = PRESETS.sun.m*10, m2 = PRESETS.sun.m*0.1, d = 600;
        const s1 = new Body(0, 0, 0, 0, m1, "#fff", mutateName("クロノス"));
        const s2 = new Body(d, 0, 0, Math.sqrt(G*(m1+m2)/d), m2, "#ffaa00", mutateName("ガイア"));
        bodies.push(s1, s2); centerBody = s1;
    } else {
        centerBody = new Body(0, 0, 0, 0, PRESETS.sun.m, "#fff", mutateName("ノヴァ"));
        bodies.push(centerBody);
    }
    for (let i=0; i<8; i++) {
        const d = 1500+Math.random()*6000, m = 0.1+Math.random()*200, a = Math.random()*Math.PI*2, v = Math.sqrt((G*(centerBody.mass))/d);
        const p = new Body((centerBody.x||0)+Math.cos(a)*d, (centerBody.y||0)+Math.sin(a)*d, (centerBody.vx||0)-Math.sin(a)*v, (centerBody.vy||0)+Math.cos(a)*v, m, `hsl(${Math.random()*360},70%,60%)`, mutateName(BASE_NAMES[i%9]));
        bodies.push(p);
        if (Math.random() < 0.33) {
            for(let j=0; j<Math.floor(Math.random()*5)+1; j++) {
                const moon = new Body(0,0,0,0, m*0.01, "#aaa", p.name+"-S"+j, null, true);
                moon.parent = p; moon.orbitDist = 30 + Math.random()*50; moon.angle = Math.random()*Math.PI*2; bodies.push(moon);
            }
        }
    }
    offset = {x:0, y:0}; updateSelect();
}

function loop() {
    if (!isPaused && !eventStopped) {
        const dt = (parseFloat(document.getElementById('timeRange').value)*0.5)/32;
        computePhysics(bodies, dt);
        bodies.forEach(b => {
            if (b.bhCountdown > 0) {
                b.bhCountdown--;
                if (b.bhCountdown === 0) {
                    eventStopped = true; whiteoutAlpha = 1.0;
                    setTimeout(() => {
                        b.name = "ブラックホール " + getSuffix(addedCount++);
                        b.updateProperties(); eventStopped = false; updateSelect();
                    }, 1000);
                }
            }
            if (showOrbits) {
                b.history.push({x:b.x, y:b.y});
                if (b.history.length > 100) b.history.shift();
            } else b.history = [];
        });
        if (isCollision) {
            for (let i=0; i<bodies.length; i++) {
                for (let j=i+1; j<bodies.length; j++) {
                    const b1 = bodies[i], b2 = bodies[j], d = Math.sqrt((b2.x-b1.x)**2+(b2.y-b1.y)**2);
                    if (d < (b1.radius+b2.radius)*0.7) {
                        const sm = b1.mass > b2.mass ? b1 : b2, vm = b1.mass > b2.mass ? b2 : b1;
                        for(let k=0; k<15; k++) particles.push({x: vm.x, y: vm.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, c: vm.color});
                        bodies.filter(m => m.parent === vm).forEach(m => bodies.splice(bodies.indexOf(m), 1));
                        sm.vx = (b1.vx*b1.mass+b2.vx*b2.mass)/(b1.mass+b2.mass); sm.vy = (b1.vy*b1.mass+b2.vy*b2.mass)/(b1.mass+b2.mass);
                        sm.mass += vm.mass; sm.updateProperties(); bodies.splice(bodies.indexOf(vm), 1); updateSelect(); j--;
                    }
                }
            }
        }
    }

    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const bhs = bodies.filter(b => b.isBlackHole);
    [...nebulae, ...backgroundStars].forEach(s => {
        let lx = s.x*canvas.width*2 + canvas.width/2 - offset.x*zoom*0.01, ly = s.y*canvas.height*2 + canvas.height/2 - offset.y*zoom*0.01;
        bhs.forEach(b => {
            const bx = (b.x-offset.x)*zoom+canvas.width/2, by = (b.y-offset.y)*zoom+canvas.height/2;
            const dx = lx-bx, dy = ly-by, d = Math.sqrt(dx*dx+dy*dy);
            if(d < 150) { lx += dx/d*(150-d)*0.4; ly += dy/d*(150-d)*0.4; }
        });
        if(s.r) {
            const grad = ctx.createRadialGradient(lx,ly,0,lx,ly,s.r); grad.addColorStop(0, s.c); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(lx-s.r, ly-s.r, s.r*2, s.r*2);
        } else { ctx.fillStyle = s.c; ctx.fillRect(lx, ly, s.s, s.s); }
    });

    const target = bodies.find(b => b.id === parseInt(document.getElementById('targetSelect').value));
    if (target) { offset.x = target.x; offset.y = target.y + (panel.offsetHeight/(2*zoom)); }

    if (showOrbits) {
        bodies.forEach(b => {
            if (b.history.length < 2) return;
            ctx.beginPath(); ctx.lineWidth = 1;
            for(let i=1; i<b.history.length; i++) {
                const p1 = b.history[i-1], p2 = b.history[i];
                ctx.moveTo((p1.x-offset.x)*zoom+canvas.width/2, (p1.y-offset.y)*zoom+canvas.height/2);
                ctx.lineTo((p2.x-offset.x)*zoom+canvas.width/2, (p2.y-offset.y)*zoom+canvas.height/2);
                ctx.strokeStyle = `rgba(255,255,255,${(i/b.history.length)*0.3})`; ctx.stroke();
            }
        });
    }

    ctx.fillStyle = "rgba(180,180,180,0.3)";
    asteroids.forEach(a => ctx.fillRect((a.x-offset.x)*zoom+canvas.width/2, (a.y-offset.y)*zoom+canvas.height/2, 1, 1));

    bodies.forEach(b => {
        if (b.isMoon && b.orbitDist * zoom < 5) return;
        const sx = (b.x-offset.x)*zoom+canvas.width/2, sy = (b.y-offset.y)*zoom+canvas.height/2, sr = Math.max(2, b.radius*zoom);
        
        if (b.isComet) {
            const dx = b.x, dy = b.y, d = Math.sqrt(dx*dx+dy*dy);
            for(let i=0; i<3; i++) {
                ctx.beginPath(); ctx.moveTo(sx, sy);
                const cp1x = sx + dx/d*60, cp1y = sy + dy/d*60;
                const endX = sx + dx/d*120, endY = sy + dy/d*120 + (i-1)*15;
                ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);
                ctx.strokeStyle = "rgba(200,220,255,0.2)"; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
        if (b.bhCountdown > 0 && Math.floor(b.bhCountdown/5)%2===0) ctx.fillStyle = "#fff";
        else ctx.fillStyle = b.color;
        ctx.fill();
        if (b.isBlackHole) { ctx.strokeStyle = "#fff"; ctx.stroke(); }
        if (b.ringType) { ctx.beginPath(); ctx.ellipse(sx, sy, sr*2.5, sr*0.8, 0.4, 0, Math.PI*2); ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); }
        
        const moons = bodies.filter(m => m.parent === b);
        const moonNameVisible = moons.length > 0 && Math.max(...moons.map(m => m.orbitDist))*zoom > canvas.width/4;
        if (showLabels && (!b.isMoon || moonNameVisible)) {
            const tx = sx + sr*0.7, ty = sy - sr*0.7; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+10, ty-10); ctx.strokeStyle="rgba(255,255,255,0.3)"; ctx.stroke();
            ctx.fillStyle="#fff"; ctx.font="10px sans-serif"; ctx.fillText(b.name, tx+12, ty-12);
        }
    });

    particles = particles.filter(p => { ctx.fillStyle=p.c||"#f60"; ctx.fillRect((p.x-offset.x)*zoom+canvas.width/2, (p.y-offset.y)*zoom+canvas.height/2, 2, 2); return true; });
    if(whiteoutAlpha > 0) { ctx.fillStyle = `rgba(255,255,255,${whiteoutAlpha})`; ctx.fillRect(0,0,canvas.width,canvas.height); whiteoutAlpha -= 0.02; }
    requestAnimationFrame(loop);
}

function updateSelect() {
    const sel = document.getElementById('targetSelect'), v = sel.value; sel.innerHTML = '<option value="-1">🔭 自由視点</option>';
    bodies.forEach(b => {
        const emojis = {'#ffcc00':'🟡','#ffffff':'⚪','#aaccff':'🔵','#aaaaaa':'⚪','#ffddaa':'🟠','#44aaff':'🔵','#ff6644':'🔴','#eeddaa':'🟤','#50c878':'🟢','#120a8f':'🔵','#ccbbbb':'⚪','#000':'⚫'};
        const o = document.createElement('option'); o.value = b.id; o.textContent = `${b.isBlackHole?'⚫':(emojis[b.baseColor]||'⚪')} ${b.name}`; sel.appendChild(o);
    });
    sel.value = v;
}

function spawn(x, y, ex, ey) {
    if (inputHandled) return;
    const sx = (x-canvas.width/2)/zoom+offset.x, sy = (y-canvas.height/2)/zoom+offset.y;
    const vx = (ex-x)*0.06/zoom, vy = (ey-y)*0.06/zoom, type = document.getElementById('launchType').value, c = PRESETS[type];
    bodies.push(new Body(sx, sy, vx, vy, !(document.getElementById('massRange').disabled) ? c.m * parseFloat(document.getElementById('massRange').value) : c.m, c.c, c.n + " " + getSuffix(addedCount++), c.r)); updateSelect();
}

canvas.onmousedown = (e) => { isDragging = true; startPos = {x:e.clientX, y:e.clientY}; inputHandled = false; };
window.onmouseup = (e) => { if(isDragging && !inputHandled) { spawn(startPos.x, startPos.y, e.clientX, e.clientY); inputHandled = true; } isDragging = false; };
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = true; startPos = {x:e.touches[0].clientX, y:e.touches[0].clientY}; inputHandled = false; if(e.touches.length===2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); lastMid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; } }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(e.touches.length===2) { const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY), mid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; zoom *= (d/lastPinchDist); offset.x -= (mid.x-lastMid.x)/zoom; offset.y -= (mid.y-lastMid.y)/zoom; lastPinchDist = d; lastMid = mid; } }, {passive: false});
canvas.addEventListener('touchend', (e) => { e.preventDefault(); if(isDragging && !inputHandled) { spawn(startPos.x, startPos.y, e.changedTouches[0].clientX, e.changedTouches[0].clientY); inputHandled = true; } isDragging = false; }, {passive: false});

window.onload = () => {
    document.getElementById('resetBtn').onclick = () => initSolarSystem();
    document.getElementById('randomBtn').onclick = () => handleGacha();
    document.getElementById('orbitBtn').onclick = function() { showOrbits = !showOrbits; this.style.background =     updateProperties() {
        if (this.mass >= 20000000 && !this.name.includes("ブラックホール")) {
            this.name = "ブラックホール " + (this.name.split(' ').pop());
            this.baseColor = "#000"; updateSelect();
        }
        this.isBlackHole = this.name.includes("ブラックホール");
        this.color = (this.isBlackHole) ? "#000" : (this.mass > 500000 && !this.isMoon ? (this.mass < 5000000 ? "#ffffff" : "#aaccff") : this.baseColor);
        this.radius = Math.max(1.5, Math.log10(this.mass + 1) * 8 * (this.isBlackHole ? 2.5 : (this.isMoon ? 0.6 : 2.5)));
    }
}

function computePhysics(bodyList, dt) {
    bodyList.forEach(b => { b.oldAx = b.ax; b.oldAy = b.ay; b.ax = 0; b.ay = 0; b.maxForce = 0; });
    for (let i = 0; i < bodyList.length; i++) {
        const b1 = bodyList[i];
        for (let j = i + 1; j < bodyList.length; j++) {
            const b2 = bodyList[j], dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx+dy*dy+0.01, d = Math.sqrt(d2), f = (G*b1.mass*b2.mass)/d2;
            b1.ax += (f*dx/d)/b1.mass; b1.ay += (f*dy/d)/b1.mass; b2.ax -= (f*dx/d)/b2.mass; b2.ay -= (f*dy/d)/b2.mass;
            if (f/b1.mass > b1.maxForce) { b1.maxForce = f/b1.mass; b1.strongestAttractorName = b2.name; b1.attractorPos = {x:b2.x, y:b2.y}; }
            if (f/b2.mass > b2.maxForce) { b2.maxForce = f/b2.mass; b2.strongestAttractorName = b1.name; b2.attractorPos = {x:b1.x, y:b1.y}; }
        }
        asteroids.forEach((a, idx) => {
            const dx = a.x - b1.x, dy = a.y - b1.y, d = Math.sqrt(dx*dx+dy*dy);
            if (d < b1.radius) asteroids.splice(idx, 1);
        });
    }
    bodyList.forEach(b => {
        if (b.isAnalytic && b.parent) {
            const omega = Math.sqrt((G*(b.parent.mass+b.mass))/Math.pow(b.orbitDist,3)); b.angle += omega*dt;
            b.x = b.parent.x + Math.cos(b.angle)*b.orbitDist; b.y = b.parent.y + Math.sin(b.angle)*b.orbitDist; return;
        }
        b.x += b.vx*dt + 0.5*b.oldAx*dt*dt; b.y += b.vy*dt + 0.5*b.oldAy*dt*dt;
        b.vx += 0.5*(b.oldAx+b.ax)*dt; b.vy += 0.5*(b.oldAy+b.ay)*dt;
    });
    asteroids.forEach(a => { a.ang += a.spd * dt; a.x = Math.cos(a.ang)*a.dist; a.y = Math.sin(a.ang)*a.dist; });
}

function initSolarSystem() {
    bodyCounter = 0; addedCount = 0; bodies = []; asteroids = []; backgroundStars = []; nebulae = [];
    const sun = new Body(0, 0, 0, 0, PRESETS.sun.m, PRESETS.sun.c, "太陽"); bodies.push(sun);
    
    // 背景恒星生成 (数千)
    for(let i=0; i<2000; i++) backgroundStars.push({
        x: Math.random()*2-1, y: Math.random()*2-1, 
        s: Math.random()*1.5,
        c: `hsl(${Math.random()*60+200}, 100%, ${Math.random()*40+60}%)` // 青白い星
    });
    // 星雲生成 (2-3)
    for(let i=0; i<3; i++) nebulae.push({
        x: Math.random()*2-1, y: Math.random()*2-1, 
        r: 100 + Math.random()*200,
        c: `hsla(${Math.random()*360}, 70%, 50%, 0.05)`
    });

    const planets = [[387, PRESETS.mercury, []], [723, PRESETS.venus, []], [1000, PRESETS.earth, [[25, 0.037, "#b0b0b0", "月"]]], [1524, PRESETS.mars, [[12, 0.0001, "#b59e8a", "フォボス"], [18, 0.0001, "#9d8b7a", "ダイモス"]]], [5203, PRESETS.jupiter, [[110, 0.45, "#e2d06e", "イオ"], [150, 0.40, "#a0a0a0", "エウロパ"], [200, 0.70, "#7a7a7a", "ガニメデ"], [250, 0.5, "#8a7a6a", "カリスト"]]], [9537, PRESETS.saturn, [[200, 0.65, "#d2a01e", "タイタン"], [150, 0.1, "#c0c0c0", "レア"], [120, 0.05, "#c0c0c0", "ディオネ"]]], [19191, PRESETS.uranus, [[120, 0.1, "#b0b0b0", "チタニア"], [150, 0.1, "#a0a0a0", "オベロン"]]], [30069, PRESETS.neptune, [[220, 0.1, "#90a0b0", "トリトン"]]], [39482, PRESETS.pluto, []]];
    planets.forEach(p => {
        const d = p[0], pr = p[1], a = Math.random()*Math.PI*2, v = Math.sqrt((G*sun.mass)/d);
        const planet = new Body(Math.cos(a)*d, Math.sin(a)*d, -Math.sin(a)*v, Math.cos(a)*v, pr.m, pr.c, pr.n, pr.r);
        bodies.push(planet);
        p[2].forEach(m => { const moon = new Body(0,0,0,0,m[1],m[2],m[3],null,true); moon.parent = planet; moon.orbitDist = m[0]; moon.angle = Math.random()*Math.PI*2; bodies.push(moon); });
    });
    bodies.push(new Body(5000, 5000, -8, -5, 0.001, "#fff", "ハレー彗星", null, false, true));
    for(let i=0; i<800; i++) { const dist = 2100 + Math.random()*1200, ang = Math.random()*Math.PI*2; asteroids.push({ dist, ang, spd: Math.sqrt(G*sun.mass/Math.pow(dist,3)), x:0, y:0 }); }
    updateSelect();
}

function loop() {
    if (!isPaused) {
        const subSteps = isHighPrecision ? 128 : 32; const dt = (parseFloat(document.getElementById('timeRange').value)*0.5)/subSteps;
        for (let s = 0; s < subSteps; s++) {
            computePhysics(bodies, dt);
            if (isCollision) {
                for (let i = 0; i < bodies.length; i++) {
                    for (let j = i+1; j < bodies.length; j++) {
                        const b1 = bodies[i], b2 = bodies[j], d = Math.sqrt((b2.x-b1.x)**2+(b2.y-b1.y)**2);
                        if (d < (b1.radius + b2.radius)*0.7) {
                            const sm = b1.mass > b2.mass ? b1 : b2, vm = b1.mass > b2.mass ? b2 : b1;
                            for(let k=0; k<15; k++) particles.push({x: vm.x, y: vm.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, c: vm.color});
                            bodies.filter(m => m.parent === vm).forEach(m => bodies.splice(bodies.indexOf(m), 1));
                            sm.vx = (b1.vx*b1.mass+b2.vx*b2.mass)/(b1.mass+b2.mass); sm.vy = (b1.vy*b1.mass+b2.vy*b2.mass)/(b1.mass+b2.mass);
                            sm.mass += vm.mass; sm.updateProperties(); bodies.splice(bodies.indexOf(vm), 1); updateSelect(); j--;
                        }
                    }
                }
            }
        }
    }
    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; return p.life > 0; });
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 背景レンダリング（レンズ効果）
    const bhs = bodies.filter(b => b.isBlackHole);
    [...nebulae, ...backgroundStars].forEach(s => {
        let lx = s.x * canvas.width * 2, ly = s.y * canvas.height * 2;
        bhs.forEach(b => {
            const bx = (b.x-offset.x)*zoom + canvas.width/2, by = (b.y-offset.y)*zoom + canvas.height/2;
            const dx = lx-bx, dy = ly-by, d = Math.sqrt(dx*dx+dy*dy);
            if(d < 150) { lx += dx/d * (150-d)*0.4; ly += dy/d * (150-d)*0.4; }
        });
        if(s.r) { // 星雲
            const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, s.r);
            grad.addColorStop(0, s.c); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(lx-s.r, ly-s.r, s.r*2, s.r*2);
        } else { // 恒星
            ctx.fillStyle = s.c; ctx.fillRect(lx, ly, s.s, s.s);
        }
    });

    const target = bodies.find(b => b.id === parseInt(document.getElementById('targetSelect').value));
    if (target) { offset.x = target.x; offset.y = target.y + (panel.offsetHeight/(2*zoom)); }

    // LOD: 1/4 width threshold
    let moonNameVisible = false;
    if (target) {
        const moons = bodies.filter(b => b.parent === target);
        if (moons.length > 0 && Math.max(...moons.map(m => m.orbitDist)) * zoom > canvas.width / 4) moonNameVisible = true;
    }

    ctx.fillStyle = "rgba(180,180,180,0.3)";
    asteroids.forEach(a => ctx.fillRect((a.x-offset.x)*zoom+canvas.width/2, (a.y-offset.y)*zoom+canvas.height/2, 1, 1));

    bodies.forEach(b => {
        if (b.isMoon && b.orbitDist * zoom < 5) return;
        const sx = (b.x-offset.x)*zoom+canvas.width/2, sy = (b.y-offset.y)*zoom+canvas.height/2, sr = Math.max(2, b.radius*zoom);
        
        if (b.isComet) {
            const dx = b.x, dy = b.y, d = Math.sqrt(dx*dx+dy*dy);
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + dx/d*40*zoom, sy + dy/d*40*zoom);
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2*zoom; ctx.stroke();
        }

        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.fill();
        if (b.isBlackHole) { ctx.strokeStyle = "#fff"; ctx.stroke(); }
        if (b.ringType) {
            ctx.beginPath(); ctx.ellipse(sx, sy, sr*2.5, sr*0.8, 0.4, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
        }
        if (showLabels && (!b.isMoon || moonNameVisible)) {
            const tx = sx + sr*0.7, ty = sy - sr*0.7;
            ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+10, ty-10); ctx.strokeStyle="rgba(255,255,255,0.3)"; ctx.stroke();
            ctx.fillStyle="#fff"; ctx.font="10px sans-serif"; ctx.fillText(b.name, tx+12, ty-12);
        }
        if (showDebug && b.attractorPos) {
            const dx = (b.attractorPos.x-offset.x)*zoom+canvas.width/2 - sx, dy = (b.attractorPos.y-offset.y)*zoom+canvas.height/2 - sy, dist = Math.sqrt(dx*dx+dy*dy);
            if(dist > 1) { ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx+dx/dist*40, sy+dy/dist*40); ctx.strokeStyle="yellow"; ctx.lineWidth=1; ctx.stroke(); }
        }
    });
    particles.forEach(p => { ctx.fillStyle=p.c || `rgba(255,100,0,${p.life})`; ctx.fillRect((p.x-offset.x)*zoom+canvas.width/2, (p.y-offset.y)*zoom+canvas.height/2, 2, 2); });
    requestAnimationFrame(loop);
}

function updateSelect() {
    const sel = document.getElementById('targetSelect'); const v = sel.value; sel.innerHTML = '<option value="-1">🔭 自由視点</option>';
    bodies.forEach(b => {
        const emojis = { '#ffcc00': '🟡', '#ffffff': '⚪', '#aaccff': '🔵', '#aaaaaa': '⚪', '#ffddaa': '🟠', '#44aaff': '🔵', '#ff6644': '🔴', '#eeddaa': '🟤', '#50c878': '🟢', '#120a8f': '🔵', '#ccbbbb': '⚪', '#000': '⚫' };
        const e = b.isBlackHole ? '⚫' : (emojis[b.baseColor] || '⚪');
        const o = document.createElement('option'); o.value = b.id; o.textContent = `${e} ${b.name}`; sel.appendChild(o);
    });
    sel.value = v;
}

function triggerSN(t) {
    if (!t || t.isBlackHole) return;
    for(let i=0; i<120; i++) particles.push({x: t.x, y: t.y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1.5, c: "#ffaa00"});
    if (t.mass >= 2000000) t.updateProperties(); else { bodies.splice(bodies.indexOf(t), 1); document.getElementById('targetSelect').value="-1"; }
    updateSelect();
}

function spawn(x, y, ex, ey) {
    if (inputHandled) return;
    const sx = (x-canvas.width/2)/zoom+offset.x, sy = (y-canvas.height/2)/zoom+offset.y;
    const vx = (ex-x)*0.06/zoom, vy = (ey-y)*0.06/zoom, type = document.getElementById('launchType').value, c = PRESETS[type];
    const b = new Body(sx, sy, vx, vy, !(document.getElementById('massRange').disabled) ? c.m * parseFloat(document.getElementById('massRange').value) : c.m, c.c, c.n + " " + getSuffix(addedCount++), c.r);
    bodies.push(b); updateSelect();
    if (isSNMode) { triggerSN(b); isSNMode = false; document.getElementById('snBtn').style.background = "#333"; }
}

canvas.onmousedown = (e) => { isDragging = true; startPos = {x:e.clientX, y:e.clientY}; inputHandled = false; };
window.onmouseup = (e) => { if(isDragging && !inputHandled) { spawn(startPos.x, startPos.y, e.clientX, e.clientY); inputHandled = true; } isDragging = false; };
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = true; startPos = {x:e.touches[0].clientX, y:e.touches[0].clientY}; inputHandled = false; if (e.touches.length === 2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); lastMid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; } }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (e.touches.length === 2) { const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); const mid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; zoom *= (d/lastPinchDist); offset.x -= (mid.x-lastMid.x)/zoom; offset.y -= (mid.y-lastMid.y)/zoom; lastPinchDist = d; lastMid = mid; } }, {passive: false});
canvas.addEventListener('touchend', (e) => { e.preventDefault(); if (isDragging && !inputHandled) { spawn(startPos.x, startPos.y, e.changedTouches[0].clientX, e.changedTouches[0].clientY); inputHandled = true; } isDragging = false; }, {passive: false});

window.onload = () => {
    document.getElementById('resetBtn').onclick = () => initSolarSystem();
    document.getElementById('randomBtn').onclick = () => { initSolarSystem(); }; // ガチャロジックはinit内に集約
    document.getElementById('snBtn').onclick = function() { isSNMode = !isSNMode; this.style.background = isSNMode ? "#b06000" : "#333"; };
    document.getElementById('pauseBtn').onclick = function() { isPaused = !isPaused; this.textContent = isPaused ? "▶️" : "⏸️"; };
    document.getElementById('labelBtn').onclick = function() { showLabels = !showLabels; this.style.background = showLabels ? "#0060b0" : "#333"; };
    document.getElementById('debugBtn').onclick = function() { showDebug = !showDebug; this.style.background = showDebug ? "#b0a000" : "#333"; };
    document.getElementById('precisionBtn').onclick = function() { isHighPrecision = !isHighPrecision; this.style.background = isHighPrecision ? "#00b060" : "#333"; };
    document.getElementById('collisionBtn').onclick = function() { isCollision = !isCollision; this.style.background = isCollision ? "#00b060" : "#333"; };
    document.getElementById('launchType').onchange = () => { document.getElementById('massRange').disabled = !(document.getElementById('launchType').value==='sun'||document.getElementById('launchType').value==='blackhole'); };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initSolarSystem(); loop();
};
