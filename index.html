<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v27.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version { position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4); font-size: 10px; pointer-events: none; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(10, 10, 25, 0.95); color: #fff;
            padding: 10px; border-radius: 16px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 550px; z-index: 100;
        }
        .ui-row { display: flex; align-items: center; gap: 12px; width: 100%; }
        select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; font-size: 14px; outline: none; cursor: pointer; }
        .icon-btn { flex: 1; font-size: 18px; padding: 8px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        input[type=range] { flex: 1; accent-color: #00b060; height: 6px; cursor: pointer; }
        label { white-space: nowrap; font-size: 12px; color: #aaa; min-width: 65px; font-weight: bold; }
        .reset-btn { font-size: 14px; padding: 4px 10px; min-width: 40px; background: #333; }
        .ui-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 4px; }
    </style>
</head>
<body>
<div id="version">v27.0 Path Fade Restored & Pause Fixed</div>
<canvas id="canvas"></canvas>
<div class="ui-panel" id="panel">
    <div class="ui-row">
        <label>🔭 視点</label>
        <select id="targetSelect" style="flex:1;"><option value="-1">自由視点</option></select>
    </div>
    <div class="ui-row">
        <label>🚀 投入</label>
        <select id="launchType" style="flex:1;">
            <option value="sun">☀️ 太陽</option><option value="mercury">☿️ 水星</option>
            <option value="venus">♀️ 金星</option><option value="earth" selected>🌍 地球</option>
            <option value="mars">♂️ 火星</option><option value="jupiter">♃ 木星</option>
            <option value="saturn">♄ 土星</option><option value="uranus">⛢ 天王星</option>
            <option value="neptune">♆ 海王星</option><option value="pluto">♇ 冥王星</option>
            <option value="blackhole">🕳️ ブラックホール</option>
        </select>
    </div>
    <div class="ui-row">
        <label>🌞 質量</label>
        <input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1" disabled>
        <button id="massReset" class="reset-btn">🔁</button>
    </div>
    <div class="ui-row">
        <label>⏩ 時間</label>
        <input type="range" id="timeRange" min="0" max="10" step="0.1" value="1.5">
        <button id="timeReset" class="reset-btn">🔁</button>
    </div>
    <div class="ui-row">
        <label>💫 軌跡</label>
        <input type="range" id="orbitLengthRange" min="0" max="5000" value="300">
        <button id="orbitReset" class="reset-btn">🔁</button>
    </div>
    <div class="ui-grid">
        <button id="pauseBtn" class="icon-btn">⏸️</button>
        <button id="resetBtn" class="icon-btn">🔄</button>
        <button id="randomBtn" class="icon-btn">🌌</button>
        <button id="labelBtn" class="icon-btn" style="background: #0060b0;">📛</button>
        <button id="debugBtn" class="icon-btn" style="background: #333;">🔍</button>
        <button id="precisionBtn" class="icon-btn" style="background: #00b060;">🎯</button>
        <button id="collisionBtn" class="icon-btn" style="background: #00b060;">⚙️</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');
let bodies = [], particles = [], asteroids = [], bgStars = [], nebulae = [], zoom = 0.4, offset = { x: 0, y: 0 }, isDragging = false, isPanning = false, startPos = null, isPaused = false, bodyCounter = 0, addedCount = 0, showLabels = true, isHighPrecision = true, showDebug = false, isCollision = true, showOrbits = true, orbitHistoryLength = 300, whiteoutAlpha = 0, eventStopped = false, lastPinchDist = 0, inputHandled = false, lastTapTime = 0;
const G = 1, M_SUN = 1000000, M_EARTH = 3.003;

const PRESETS = {
    sun: { m: M_SUN, c: '#ffcc00', n: "太陽" }, mercury: { m: 0.166, c: '#aaaaaa', n: "水星" },
    venus: { m: 2.447, c: '#ffddaa', n: "金星" }, earth: { m: M_EARTH, c: '#44aaff', n: "地球" },
    mars: { m: 0.322, c: '#ff6644', n: "火星" }, jupiter: { m: 954.7, c: '#ffcc99', n: "木星" },
    saturn: { m: 285.8, c: '#eeddaa', n: "土星", r: "h" }, uranus: { m: 43.66, c: '#50c878', n: "天王星", r: "h" },
    neptune: { m: 51.51, c: '#120a8f', n: "海王星" }, pluto: { m: 0.006, c: '#ccbbbb', n: "冥王星" },
    blackhole: { m: 10000000, c: '#000', n: "ブラックホール" }
};

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ax = 0; this.ay = 0; this.mass = mass; 
        this.baseColor = color; this.color = color; this.name = name; this.ringType = ringType; this.isMoon = isMoon;
        this.isAnalytic = isMoon; this.parent = null; this.orbitDist = 0; this.angle = 0;
        this.history = []; this.bhCountdown = -1; this.maxForce = 0; this.attractorPos = null;
        this.updateProperties();
    }
    updateProperties() {
        this.isBlackHole = this.name.includes("ブラックホール");
        this.color = this.isBlackHole ? "#000" : (this.mass > 500000 && !this.isMoon ? (this.mass < 5000000 ? "#ffffff" : "#aaccff") : this.baseColor);
        this.radius = Math.max(1.5, Math.log10(this.mass + 1) * 8 * (this.isBlackHole ? 2.5 : (this.isMoon ? 0.6 : 2.5)));
    }
}

function computePhysics(bodyList, dt) {
    bodyList.forEach(b => { b.oldAx = b.ax; b.oldAy = b.ay; b.ax = 0; b.ay = 0; });
    for (let i = 0; i < bodyList.length; i++) {
        const b1 = bodyList[i]; if (b1.isAnalytic) continue;
        for (let j = i + 1; j < bodyList.length; j++) {
            const b2 = bodyList[j]; if (b2.isAnalytic) continue;
            const dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx+dy*dy+100, d = Math.sqrt(d2), f = (G*b1.mass*b2.mass)/d2;
            b1.ax += (f*dx/d)/b1.mass; b1.ay += (f*dy/d)/b1.mass; b2.ax -= (f*dx/d)/b2.mass; b2.ay -= (f*dy/d)/b2.mass;
            if (f/b1.mass > b1.maxForce) { b1.maxForce = f/b1.mass; b1.attractorPos = {x:b2.x, y:b2.y}; }
            if (f/b2.mass > b2.maxForce) { b2.maxForce = f/b2.mass; b2.attractorPos = {x:b1.x, y:b1.y}; }
        }
    }
    bodyList.forEach(b => {
        if (!b.isAnalytic) {
            b.x += b.vx*dt + 0.5*b.oldAx*dt*dt; b.y += b.vy*dt + 0.5*b.oldAy*dt*dt;
            b.vx += 0.5*(b.oldAx+b.ax)*dt; b.vy += 0.5*(b.oldAy+b.ay)*dt;
        } else if (b.parent) {
            const omega = Math.sqrt((G * 135 * (b.parent.mass + b.mass)) / Math.pow(b.orbitDist, 3));
            b.angle += omega * dt;
            b.x = b.parent.x + Math.cos(b.angle)*b.orbitDist;
            b.y = b.parent.y + Math.sin(b.angle)*b.orbitDist;
        }
    });
}

function initSolarSystem() {
    bodies = []; asteroids = []; bgStars = []; nebulae = []; bodyCounter = 0; addedCount = 0;
    const sun = new Body(0, 0, 0, 0, PRESETS.sun.m, PRESETS.sun.c, "太陽"); bodies.push(sun);
    for(let i=0; i<20000; i++) bgStars.push({ x: Math.random()*4000, y: Math.random()*4000, s: Math.random()*1.2, c: `rgba(255,255,255,${Math.random()*0.3+0.1})` });
    for(let i=0; i<3; i++) nebulae.push({ x: Math.random()*2000, y: Math.random()*2000, r: 300+Math.random()*400, c: `hsla(${Math.random()*360}, 60%, 45%, 0.1)` });
    const planets = [
        [387, PRESETS.mercury, []], [723, PRESETS.venus, []],
        [1000, PRESETS.earth, [[20, 0.003, "#b0b0b0", "月"]]], 
        [1524, PRESETS.mars, [[18, 0.0001, "#b59e8a", "フォボス"]]],
        [5203, PRESETS.jupiter, [[60, 0.45, "#e2d06e", "イオ"],[80, 0.4, "#a0a0a0", "エウロパ"],[100, 0.7, "#7a7a7a", "ガニメデ"]]],
        [9537, PRESETS.saturn, [[120, 0.65, "#d2a01e", "タイタン"]]],
        [19191, PRESETS.uranus, [[80, 0.1, "#b0b0b0", "チタニア"]]],
        [30069, PRESETS.neptune, [[110, 0.1, "#90a0b0", "トリトン"]]]
    ];
    planets.forEach(p => {
        const a = Math.random()*Math.PI*2, v = Math.sqrt((G*sun.mass)/p[0]);
        const planet = new Body(Math.cos(a)*p[0], Math.sin(a)*p[0], -Math.sin(a)*v, Math.cos(a)*v, p[1].m, p[1].c, p[1].n, p[1].r);
        bodies.push(planet);
        p[2].forEach(m => { const moon = new Body(0,0,0,0,m[1],m[2],m[3],null,true); moon.parent = planet; moon.orbitDist = m[0]; moon.angle = Math.random()*Math.PI*2; bodies.push(moon); });
    });
    for(let i=0; i<1200; i++) { const d = 2100+Math.random()*1200, an = Math.random()*Math.PI*2; asteroids.push({ dist: d, ang: an, spd: Math.sqrt(G*sun.mass/Math.pow(d,3)) }); }
    offset = {x:0, y:0}; updateSelect();
}

function handleGacha() {
    bodies = []; asteroids = []; bodyCounter = 0; addedCount = 0;
    const mode = Math.random() < 0.1 ? (Math.random() < 0.5 ? "A" : "B") : "S";
    let center;
    if (mode === "A") {
        const m = PRESETS.sun.m, d = 650, v = 0.5*Math.sqrt(G*2*m/d);
        const s1 = new Body(-d/2, 0, 0, v, m, "#fff", mutateName("ゼウス")), s2 = new Body(d/2, 0, 0, -v, m, "#fff", mutateName("ヘリオス"));
        bodies.push(s1, s2); center = {x:0, y:0, mass: 2*m, vx:0, vy:0};
    } else if (mode === "B") {
        const m1 = PRESETS.sun.m*8, m2 = PRESETS.sun.m*0.05, d = 700;
        const b1 = new Body(0, 0, 0, 0, m1, "#fff", mutateName("クロノス"));
        bodies.push(b1, new Body(d, 0, 0, Math.sqrt(G*(m1+m2)/d), m2, "#ffaa00", mutateName("ガイア")));
        center = b1;
    } else {
        center = new Body(0, 0, 0, 0, PRESETS.sun.m, '#fff', mutateName("ノヴァ"));
        bodies.push(center);
    }
    for (let i=0; i<8; i++) {
        const d = 1600+Math.random()*5000, m = 100+Math.random()*1000, a = Math.random()*Math.PI*2, v = Math.sqrt((G*(center.mass||M_SUN))/d);
        const p = new Body(Math.cos(a)*d, Math.sin(a)*d, -Math.sin(a)*v, Math.cos(a)*v, m, `hsl(${Math.random()*360},70%,60%)`, mutateName(BASE_NAMES[i%9]));
        bodies.push(p);
        if (Math.random() < 0.4) {
            const mn = new Body(0,0,0,0, m*0.01, "#aaa", p.name+"-S"+getSuffix(addedCount++), null, true); mn.parent = p; mn.orbitDist = 30+Math.random()*20; mn.angle = Math.random()*Math.PI*2; bodies.push(mn);
        }
    }
    offset = {x:0, y:0}; updateSelect();
}

function loop() {
    if (!isPaused && !eventStopped) {
        const subSteps = isHighPrecision ? 128 : 32; const dt = (parseFloat(document.getElementById('timeRange').value)*0.5)/subSteps;
        for (let s = 0; s < subSteps; s++) {
            computePhysics(bodies, dt);
            if (showOrbits && s % 8 === 0) { 
                bodies.forEach(b => { 
                    b.history.push({x: b.x, y: b.y}); 
                    if (b.history.length > orbitHistoryLength) b.history.shift(); 
                }); 
            }
            if (isCollision) {
                for (let i=0; i<bodies.length; i++) {
                    const b1 = bodies[i]; if (b1.isAnalytic) continue;
                    for (let j = i + 1; j < bodies.length; j++) {
                        const b2 = bodies[j]; if (b2.isAnalytic) continue;
                        const dx = b2.x-b1.x, dy = b2.y-b1.y, d = Math.sqrt(dx*dx+dy*dy);
                        if (d < (b1.radius + b2.radius) * 0.9) {
                            const sm = b1.mass > b2.mass ? b1 : b2, vm = b1.mass > b2.mass ? b2 : b1;
                            for(let k=0; k<15; k++) particles.push({x: vm.x, y: vm.y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1, c: vm.color});
                            sm.mass += vm.mass; sm.updateProperties(); bodies.splice(bodies.indexOf(vm), 1); updateSelect(); j--;
                        }
                    }
                }
            }
        }
    }

    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const bhs = bodies.filter(b => b.isBlackHole);

    [...nebulae, ...bgStars].forEach(s => {
        let lx = (s.x - offset.x*zoom*0.01) % canvas.width, ly = (s.y - offset.y*zoom*0.01) % canvas.height;
        if(lx<0) lx+=canvas.width; if(ly<0) ly+=canvas.height;
        bhs.forEach(b => {
            const bx = (b.x-offset.x)*zoom+canvas.width/2, by = (b.y-offset.y)*zoom+canvas.height/2, dx = lx-bx, dy = ly-by, dist = Math.sqrt(dx*dx+dy*dy);
            if(dist < 180) { lx += dx/dist*(180-dist)*0.6; ly += dy/dist*(180-dist)*0.6; }
        });
        if(s.r) { const grad = ctx.createRadialGradient(lx,ly,0,lx,ly,s.r); grad.addColorStop(0, s.c); grad.addColorStop(1, 'transparent'); ctx.fillStyle = grad; ctx.fillRect(lx-s.r, ly-s.r, s.r*2, s.r*2); }
        else { ctx.fillStyle = s.c || "#555"; ctx.fillRect(lx, ly, s.s, s.s); }
    });

    const target = bodies.find(b => b.id === parseInt(document.getElementById('targetSelect').value));
    if (target) { offset.x = target.x; offset.y = target.y + (panel.offsetHeight/(2*zoom)); }

    if (showOrbits && orbitHistoryLength > 0) {
        bodies.forEach(b => {
            if (b.history.length < 2) return;
            if (b.isMoon && b.orbitDist * zoom < 15) return;
            const len = b.history.length;
            for(let i=1; i<len; i++) {
                const p1 = b.history[i-1], p2 = b.history[i];
                ctx.beginPath();
                ctx.moveTo((p1.x-offset.x)*zoom+canvas.width/2, (p1.y-offset.y)*zoom+canvas.height/2);
                ctx.lineTo((p2.x-offset.x)*zoom+canvas.width/2, (p2.y-offset.y)*zoom+canvas.height/2);
                // 軌跡のフェード復活
                let alpha = (i < len / 2) ? i / (len / 2) : 1.0;
                if (i > len * 0.9) alpha *= (1.0 - (i - len * 0.9) / (len * 0.1)) + 0.5;
                ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.25})`;
                ctx.lineWidth = 1; ctx.stroke();
            }
        });
    }

    bodies.forEach(b => {
        if (b.isMoon && b.orbitDist * zoom < 5) return;
        const sx = (b.x-offset.x)*zoom+canvas.width/2, sy = (b.y-offset.y)*zoom+canvas.height/2;
        const moons = bodies.filter(m => m.parent === b);
        let drawRadius = b.radius;
        if (moons.length > 0) drawRadius = Math.min(drawRadius, Math.min(...moons.map(m => m.orbitDist)) * 0.45);
        const sr = Math.max(2, drawRadius * zoom);
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
        ctx.fillStyle = b.color; ctx.fill();
        if (b.isBlackHole) { ctx.strokeStyle = "#fff"; ctx.stroke(); }
        if (b.ringType) { ctx.beginPath(); ctx.ellipse(sx, sy, sr*2.5, sr*0.8, 0.4, 0, Math.PI*2); ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); }
        if (showLabels && (!b.isMoon || b.orbitDist * zoom > 30)) {
            const tx = sx + sr*0.7, ty = sy - sr*0.7; ctx.fillStyle="#fff"; ctx.font="10px sans-serif"; 
            if (showDebug) {
                ctx.fillText(b.name, tx+12, ty-18);
                ctx.fillStyle="#0f0"; ctx.fillText(`${(b.mass/M_SUN).toPrecision(5)} M☉`, tx+12, ty-8);
                ctx.fillStyle="#4af"; ctx.fillText(`${(b.mass/M_EARTH).toPrecision(5)} M⊕`, tx+12, ty+2);
            } else { ctx.fillText(b.name, tx+12, ty-12); }
        }
    });

    particles = particles.filter(p => { 
        p.x += p.vx; p.y += p.vy; p.life -= 0.02; 
        if(p.life > 0) { ctx.fillStyle=p.c; ctx.fillRect((p.x-offset.x)*zoom+canvas.width/2, (p.y-offset.y)*zoom+canvas.height/2, 2, 2); return true; }
        return false;
    });
    requestAnimationFrame(loop);
}

function updateSelect() {
    const sel = document.getElementById('targetSelect'), v = sel.value; sel.innerHTML = '<option value="-1">自由視点</option>';
    bodies.forEach(b => {
        const o = document.createElement('option'); o.value = b.id; o.textContent = b.name; sel.appendChild(o);
    });
    sel.value = v;
}

function deleteBody(x, y) {
    const wx = (x - canvas.width/2)/zoom + offset.x, wy = (y - canvas.height/2)/zoom + offset.y;
    const idx = bodies.findIndex(b => Math.sqrt((b.x-wx)**2+(b.y-wy)**2) < b.radius + 15/zoom);
    if(idx !== -1) { bodies.splice(idx, 1); updateSelect(); }
}

function spawn(x, y, ex, ey) {
    if (inputHandled) return;
    const sx = (x-canvas.width/2)/zoom+offset.x, sy = (y-canvas.height/2)/zoom+offset.y;
    const vx = (ex-x)*0.06/zoom, vy = (ey-y)*0.06/zoom;
    const type = document.getElementById('launchType').value;
    const c = PRESETS[type];
    const mFactor = (type === 'sun' || type === 'blackhole') ? parseFloat(document.getElementById('massRange').value) : 1;
    bodies.push(new Body(sx, sy, vx, vy, c.m * mFactor, c.c, c.n + " " + getSuffix(addedCount++), c.r, false));
    updateSelect();
}

// Controls
canvas.onmousedown = (e) => { if(e.button===0) { isDragging=true; startPos={x:e.clientX, y:e.clientY}; inputHandled=false; } if(e.button===1) isPanning=true; };
canvas.ondblclick = (e) => deleteBody(e.clientX, e.clientY);
window.onmousemove = (e) => {
    if(isPanning) { offset.x -= (e.clientX-startPos.x)/zoom; offset.y -= (e.clientY-startPos.y)/zoom; startPos={x:e.clientX, y:e.clientY}; }
    if(isDragging) {
        const dx = e.clientX-startPos.x, dy = e.clientY-startPos.y;
        if(dx>5 && dy<-5) { zoom*=1.02; startPos={x:e.clientX, y:e.clientY}; inputHandled=true; }
        else if(dx<-5 && dy>5) { zoom*=0.98; startPos={x:e.clientX, y:e.clientY}; inputHandled=true; }
    }
};
window.onmouseup = (e) => { if(e.button===0 && isDragging) { if(!inputHandled) spawn(startPos.x, startPos.y, e.clientX, e.clientY); isDragging=false; } isPanning=false; };
canvas.onwheel = (e) => { e.preventDefault(); zoom *= (e.deltaY<0?1.1:0.9); };

canvas.addEventListener('touchstart', (e) => { 
    e.preventDefault(); const now = Date.now();
    if (now - lastTapTime < 300) { deleteBody(e.touches[0].clientX, e.touches[0].clientY); isDragging = false; } 
    else { isDragging = true; startPos = {x:e.touches[0].clientX, y:e.touches[0].clientY}; inputHandled = false; }
    lastTapTime = now;
    if(e.touches.length===2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); lastMid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; } 
}, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(e.touches.length===2) { const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY), mid = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; zoom *= (d/lastPinchDist); offset.x -= (mid.x-lastMid.x)/zoom; offset.y -= (mid.y-lastMid.y)/zoom; lastPinchDist = d; lastMid = mid; } }, {passive: false});
canvas.addEventListener('touchend', (e) => { e.preventDefault(); if(isDragging && !inputHandled) { spawn(startPos.x, startPos.y, e.changedTouches[0].clientX, e.changedTouches[0].clientY); inputHandled = true; } isDragging = false; }, {passive: false});

window.onload = () => {
    const pBtn = document.getElementById('pauseBtn');
    pBtn.onclick = () => { isPaused = !isPaused; pBtn.textContent = isPaused ? "▶️" : "⏸️"; };
    document.getElementById('orbitLengthRange').oninput = (e) => { orbitHistoryLength = parseInt(e.target.value); showOrbits = orbitHistoryLength > 0; };
    document.getElementById('orbitReset').onclick = () => { orbitHistoryLength = 300; document.getElementById('orbitLengthRange').value = 300; showOrbits = true; };
    document.getElementById('massReset').onclick = () => { document.getElementById('massRange').value = 1; };
    document.getElementById('timeReset').onclick = () => { document.getElementById('timeRange').value = 1.5; };
    document.getElementById('resetBtn').onclick = () => initSolarSystem();
    document.getElementById('randomBtn').onclick = () => handleGacha();
    document.getElementById('debugBtn').onclick = function() { showDebug = !showDebug; this.style.background = showDebug ? "#b0a000" : "#333"; };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initSolarSystem(); loop();
};
</script>
</body>
</html>
