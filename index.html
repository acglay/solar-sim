<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v16.1 DEBUG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #debug-log { position: absolute; top: 40px; left: 10px; color: #f00; font-family: monospace; font-size: 12px; pointer-events: none; white-space: pre-wrap; background: rgba(0,0,0,0.7); }
        .ui-panel { position: absolute; bottom: 10px; left: 10px; right: 10px; background: rgba(10, 10, 25, 0.95); color: #fff; padding: 12px; border-radius: 16px; border: 1px solid #444; max-width: 500px; z-index: 100; }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
        button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div id="version">v16.1 Debug Edition</div>
<div id="debug-log"></div>
<canvas id="canvas"></canvas>
<div class="ui-panel">
    <div class="ui-row">
        <button id="resetBtn">🔄 Reset</button>
        <button id="randomBtn">🌌 Gacha</button>
        <button id="orbitBtn">💫 Orbit</button>
    </div>
    <div id="status" style="font-size: 10px; color: #888;">System: Normal</div>
</div>

<script>
// エラーを画面に表示するためのロガー
window.onerror = function(msg, url, line) {
    document.getElementById('debug-log').innerText += `ERROR: ${msg}\nLine: ${line}\n`;
    return false;
};

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let bodies = [], asteroids = [], bgStars = [], zoom = 0.4, offset = {x:0, y:0}, isPaused = false, showOrbits = true, whiteoutAlpha = 0, eventStopped = false;
const G = 1;

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false) {
        this.x = x || 0; this.y = y || 0; this.vx = vx || 0; this.vy = vy || 0;
        this.mass = mass || 1; this.color = color; this.name = name;
        this.ringType = ringType; this.isMoon = isMoon;
        this.history = []; this.bhCountdown = -1;
        this.updateProperties();
    }
    updateProperties() {
        this.isBlackHole = this.name.includes("ブラックホール");
        this.radius = Math.max(2, Math.log10(this.mass + 1) * 8 * (this.isBlackHole ? 2.5 : 2.5));
    }
}

function init() {
    try {
        bodies = []; bgStars = [];
        // 背景の星の描画座標を固定
        for(let i=0; i<5000; i++) bgStars.push({x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, s: Math.random()*1.5});
        
        // シンプルな太陽と地球から開始
        bodies.push(new Body(0, 0, 0, 0, 1000000, "#ffcc00", "太陽"));
        bodies.push(new Body(1000, 0, 0, 31, 3, "#44aaff", "地球"));
        
        document.getElementById('status').innerText = "System: Solar Loaded";
    } catch(e) { window.onerror(e.message, null, "init"); }
}

function loop() {
    try {
        if (!isPaused && !eventStopped) {
            // 物理演算
            bodies.forEach(b1 => {
                bodies.forEach(b2 => {
                    if (b1 === b2) return;
                    let dx = b2.x - b1.x, dy = b2.y - b1.y, d2 = dx*dx + dy*dy + 100;
                    let f = (G * b1.mass * b2.mass) / d2;
                    let d = Math.sqrt(d2);
                    b1.vx += (f * dx / d) / b1.mass;
                    b1.vy += (f * dy / d) / b1.mass;
                });
                b1.x += b1.vx; b1.y += b1.vy;
                if(showOrbits) { b1.history.push({x:b1.x, y:b1.y}); if(b1.history.length > 50) b1.history.shift(); }
            });
        }

        // 描画
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 背景星 (シンプル版)
        ctx.fillStyle = "#fff";
        bgStars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        // 天体描画
        bodies.forEach(b => {
            let sx = (b.x - offset.x) * zoom + canvas.width/2;
            let sy = (b.y - offset.y) * zoom + canvas.height/2;
            let sr = b.radius * zoom;

            // 軌道描画
            if(showOrbits && b.history.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.2)";
                b.history.forEach((p, i) => {
                    let px = (p.x - offset.x) * zoom + canvas.width/2;
                    let py = (p.y - offset.y) * zoom + canvas.height/2;
                    if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(sx, sy, Math.max(1, sr), 0, Math.PI*2);
            ctx.fillStyle = b.color; ctx.fill();
            
            ctx.fillStyle = "#fff"; ctx.font = "10px Arial";
            ctx.fillText(b.name, sx + 10, sy);
        });

        requestAnimationFrame(loop);
    } catch(e) { window.onerror(e.message, null, "loop"); }
}

window.onload = () => {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.getElementById('resetBtn').onclick = init;
    document.getElementById('orbitBtn').onclick = () => showOrbits = !showOrbits;
    init(); loop();
};
</script>
</body>
</html>
