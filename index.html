<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v5.8 - Ultra Precision</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(10, 10, 25, 0.95); color: #fff;
            padding: 12px; border-radius: 16px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 500px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; flex: 1; }
        .icon-btn { font-size: 18px; padding: 8px; flex: 1; border: 1px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        input[type=range] { flex: 2; accent-color: #55aaff; height: 6px; }
        label { white-space: nowrap; font-size: 11px; color: #aaa; min-width: 40px; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="ui-panel">
    <div class="ui-row"><select id="targetSelect"><option value="-1">🔭 自由視点</option></select></div>
    <div class="ui-row">
        <select id="physicsMode"><option value="collision">⚙️ 合体</option><option value="normal">⚙️ 透過</option></select>
        <select id="launchType">
            <option value="earth" selected>🚀 地球</option><option value="sun">🚀 太陽</option>
            <option value="mercury">🚀 水星</option><option value="venus">🚀 金星</option>
            <option value="mars">🚀 火星</option><option value="jupiter">🚀 木星</option>
            <option value="saturn">🚀 土星</option><option value="uranus">🚀 天王星</option>
            <option value="neptune">🚀 海王星</option><option value="pluto">🚀 冥王星</option>
        </select>
    </div>
    <div class="ui-row"><label>🌞 質量</label><input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1"></div>
    <div class="ui-row"><label>⏩ 時間</label><input type="range" id="timeRange" min="0" max="10" step="0.1" value="1.5"></div>
    <div class="ui-row">
        <button id="pauseBtn" class="icon-btn">⏸️</button>
        <button id="resetBtn" class="icon-btn">🔄</button>
        <button id="randomBtn" class="icon-btn">🌌</button>
        <button id="snBtn" class="icon-btn" style="background: #b06000;">⭐</button>
        <button id="labelBtn" class="icon-btn" style="background: #0060b0;">📛</button>
        <button id="precisionBtn" class="icon-btn" style="background: #00b060;">🎯</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const ui = {}; // 初期化時に格納

let bodies = [], particles = [], zoom = 0.5, offset = { x: 0, y: 0 }, isDragging = false, startPos = null, currentPos = null, lastPinchDist = 0, lastMidPoint = null, isPaused = false, bodyCounter = 0, supernovaTimer = 0, supernovaActive = false, supernovaTargetId = null, flashAlpha = 0, animFrame = 0, isSNEnabled = true, showLabels = true, isHighPrecision = true;
const G = 1;

const PRESETS = {
    sun: { m: 50000, c: '#ffcc00', n: "太陽" }, mercury: { m: 0.015, c: '#aaaaaa', n: "水星" }, venus: { m: 0.12, c: '#ffddaa', n: "金星" }, earth: { m: 0.15, c: '#44aaff', n: "地球" }, mars: { m: 0.015, c: '#ff6644', n: "火星" }, jupiter: { m: 50, c: '#ffcc99', n: "木星" }, saturn: { m: 15, c: '#eeddaa', n: "土星", r: "h" }, uranus: { m: 2.5, c: '#50c878', n: "天王星", r: "v" }, neptune: { m: 3.0, c: '#120a8f', n: "海王星" }, pluto: { m: 0.003, c: '#ccbbbb', n: "冥王星" }
};

function lerpColor(c1, c2, f) {
    const r1 = parseInt(c1.substr(1, 2), 16), g1 = parseInt(c1.substr(3, 2), 16), b1 = parseInt(c1.substr(5, 2), 16);
    const r2 = parseInt(c2.substr(1, 2), 16), g2 = parseInt(c2.substr(3, 2), 16), b2 = parseInt(c2.substr(5, 2), 16);
    return `rgb(${Math.round(r1 + f * (r2 - r1))},${Math.round(g1 + f * (g2 - g1))},${Math.round(b1 + f * (b2 - b1))})`;
}

function getColorByMass(mass) {
    const colors = [{ m: 100, c: '#ff5533' }, { m: 1000, c: '#ffcc00' }, { m: 50000, c: '#ffffff' }, { m: 200000, c: '#88ccff' }];
    if (mass <= colors[0].m) return colors[0].c;
    if (mass >= colors[colors.length - 1].m) return colors[colors.length - 1].c;
    for (let i = 0; i < colors.length - 1; i++) {
        if (mass >= colors[i].m && mass < colors[i + 1].m) return lerpColor(colors[i].c, colors[i + 1].c, (mass - colors[i].m) / (colors[i + 1].m - colors[i].m));
    }
}

class Particle {
    constructor(x, y, vx, vy, color) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.life = 1.0; }
    update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= 0.05; return this.life > 0; }
    draw() { const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2; ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(sx, sy, 2, 2); ctx.globalAlpha = 1.0; }
}

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false, isPreset = false) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.mass = mass; 
        this.color = color; this.name = name; this.ringType = ringType; this.isMoon = isMoon; this.isPreset = isPreset;
        this.isBlackHole = false; this.updateRadius();
    }
    updateRadius() {
        const visualMass = this.isMoon ? this.mass * 10 : this.mass;
        this.radius = Math.max(0.8, Math.pow(visualMass, 1/3) * (this.isBlackHole ? 1.0 : (this.isMoon ? 0.6 : 1.8)));
        if (!this.isBlackHole && this.mass >= 100 && !this.isPreset) this.color = getColorByMass(this.mass);
    }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(this.isMoon ? 0.2 : 1.0, this.radius * zoom);
        let alpha = this.isMoon ? Math.min(1.0, zoom * 1.5) : 1.0;
        ctx.globalAlpha = alpha;
        if (this.isBlackHole) { this.drawGargantua(sx, sy, sr); }
        else {
            if (this.ringType === "h") {
                ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.8, sr * 0.8, 0.4, 0, Math.PI * 2); ctx.strokeStyle = `rgba(200, 180, 150, ${alpha * 0.4})`; ctx.lineWidth = 2 * zoom; ctx.stroke();
            } else if (this.ringType === "v") {
                ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.5, sr * 0.6, 1.4, 0, Math.PI * 2); ctx.strokeStyle = `rgba(180, 220, 255, ${alpha * 0.4})`; ctx.lineWidth = 1 * zoom; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
        }
        if (showLabels && !this.isBlackHole) {
            let showThisLabel = this.isMoon ? zoom > 0.8 : true;
            if (showThisLabel) {
                ctx.globalAlpha = this.isMoon ? Math.min(1.0, (zoom - 0.8) * 5) : 1.0;
                ctx.fillStyle = "white"; ctx.font = `${this.isMoon?9:12}px sans-serif`; ctx.textAlign = "center"; ctx.fillText(this.name, sx, sy - sr - 5);
            }
        }
        ctx.globalAlpha = 1.0;
    }
    drawGargantua(sx, sy, sr) {
        animFrame += 0.02; ctx.save();
        const glowGrad = ctx.createRadialGradient(sx, sy, sr, sx, sy, sr * 5);
        glowGrad.addColorStop(0, "rgba(255, 220, 100, 0.5)"); glowGrad.addColorStop(1, "rgba(255, 50, 0, 0)");
        ctx.beginPath(); ctx.ellipse(sx, sy, sr * 4, sr * 2, 0, 0, Math.PI * 2); ctx.fillStyle = glowGrad; ctx.fill();
        const diskGrad = ctx.createLinearGradient(sx - sr*5, sy, sx + sr*4, sy);
        diskGrad.addColorStop(0, "rgba(255, 100, 0, 0)"); diskGrad.addColorStop(0.5, "rgba(255, 255, 220, 0.9)"); diskGrad.addColorStop(1, "rgba(255, 100, 0, 0)");
        ctx.beginPath(); ctx.ellipse(sx, sy, sr * 5, sr * 0.5, Math.sin(animFrame * 0.3) * 0.05, 0, Math.PI * 2); ctx.strokeStyle = diskGrad; ctx.lineWidth = sr * 0.4; ctx.stroke();
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill(); ctx.restore();
    }
}

function initSolarSystem() {
    bodyCounter = 0; supernovaActive = false; supernovaTargetId = null; bodies = [];
    const sun = new Body(0, 0, 0, 0, 50000, '#ffcc00', "太陽", null, false, false); bodies.push(sun);
    const data = [[200, 0.015, '#aaaaaa', "水星", null, []], [350, 0.12, '#ffddaa', "金星", null, []], [500, 0.15, '#44aaff', "地球", null, [[20, 0.005, "#b0b0b0", "月"]]], [750, 0.015, '#ff6644', "火星", null, []], [1200, 50, '#ffcc99', "木星", null, [[45, 0.5, "#e2d06e", "イオ"], [65, 0.5, "#a0a0a0", "エウロパ"], [90, 0.8, "#7a7a7a", "ガニメデ"]]], [1800, 15, '#eeddaa', "土星", "h", [[110, 0.5, "#d2a01e", "タイタン"]]], [2400, 2.5, '#50c878', "天王星", "v", []], [3000, 3.0, '#120a8f', "海王星", null, [[100, 0.4, "#90a0b0", "トリトン"]]]];
    data.forEach(p => { const planet = addKeplerBody(sun, p[0], p[1], p[2], p[3], p[4], false, true); p[5].forEach(m => addKeplerBody(planet, m[0], m[1], m[2], m[3], null, true, false)); });
    updateSelect();
}

function addKeplerBody(parent, dist, mass, color, name, ringType = null, isMoon = false, isPreset = false) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.sqrt((G * (parent.mass + mass)) / dist);
    return new Body(parent.x + Math.cos(angle)*dist, parent.y + Math.sin(angle)*dist, parent.vx - Math.sin(angle)*speed, parent.vy + Math.cos(angle)*speed, mass, color, name, ringType, isMoon, isPreset);
}

function updateSelect() { ui.targetSelect.innerHTML = '<option value="-1">🔭 自由視点</option>'; bodies.forEach(b => { const o = document.createElement('option'); o.value = b.id; o.textContent = (b.isBlackHole?"🕳️ ":"🪐 ") + b.name; ui.targetSelect.appendChild(o); }); }

function loop() {
    const timeScale = parseFloat(ui.timeRange.value);
    if (!isPaused) {
        const subSteps = isHighPrecision ? 128 : 32;
        const dt = (timeScale * 0.4) / subSteps;
        for (let s = 0; s < subSteps; s++) {
            for (let i = 0; i < bodies.length; i++) {
                const b1 = bodies[i];
                for (let j = i + 1; j < bodies.length; j++) {
                    const b2 = bodies[j];
                    const dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx + dy*dy + 0.1, d = Math.sqrt(d2);
                    const f = (G * b1.mass * b2.mass) / d2;
                    b1.vx += (f * dx / d) / b1.mass * dt; b1.vy += (f * dy / d) / b1.mass * dt;
                    b2.vx -= (f * dx / d) / b2.mass * dt; b2.vy -= (f * dy / d) / b2.mass * dt;
                }
            }
            bodies.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
        }
        // 衝突 & SN判定 (毎フレーム)
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const b1 = bodies[i], b2 = bodies[j], dx = b2.x-b1.x, dy = b2.y-b1.y, d = Math.sqrt(dx*dx+dy*dy);
                if (d < (b1.radius + b2.radius)) {
                    if (ui.physicsMode.value === 'collision') {
                        const m = b1.mass + b2.mass;
                        b1.vx = (b1.vx*b1.mass + b2.vx*b2.mass)/m; b1.vy = (b1.vy*b1.mass + b2.vy*b2.mass)/m;
                        b1.mass = m; b1.updateRadius(); bodies.splice(j, 1); updateSelect(); j--;
                    }
                }
            }
        }
    }
    ctx.fillStyle = '#000208'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const target = bodies.find(b => b.id === parseInt(ui.targetSelect.value));
    if (target) { offset.x = target.x; offset.y = target.y; }
    bodies.forEach(b => b.draw());
    requestAnimationFrame(loop);
}

// 起動処理
window.onload = () => {
    ['targetSelect','physicsMode','launchType','massRange','timeRange','pauseBtn','resetBtn','randomBtn','snBtn','labelBtn','precisionBtn'].forEach(id => ui[id] = document.getElementById(id));
    ui.resetBtn.onclick = () => initSolarSystem();
    ui.pauseBtn.onclick = () => { isPaused = !isPaused; ui.pauseBtn.textContent = isPaused ? "▶️" : "⏸️"; };
    ui.precisionBtn.onclick = () => { isHighPrecision = !isHighPrecision; ui.precisionBtn.style.background = isHighPrecision ? "#00b060" : "#333"; };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initSolarSystem();
    loop();
};
</script>
</body>
</html>
