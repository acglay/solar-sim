<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ちいさな宇宙シミュレーター</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(20, 20, 30, 0.85); color: #fff;
            padding: 15px; border-radius: 12px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: auto; max-width: 400px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; }
        label { font-size: 14px; font-weight: bold; }
        input[type=range] { width: 60%; accent-color: #ffcc00; }
        .desc { font-size: 10px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-panel">
    <div class="ui-row">
        <label>🌞 太陽の重さ</label>
        <input type="range" id="massRange" min="500" max="10000" value="2000">
    </div>
    <div class="ui-row">
        <label>⏩ 時間の速さ</label>
        <input type="range" id="timeRange" min="0" max="5" step="0.1" value="1">
    </div>
    <div class="desc">画面をドラッグして太陽を飛ばそう！ 2本指でズーム</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const massInput = document.getElementById('massRange');
const timeInput = document.getElementById('timeRange');

let bodies = [];
let zoom = 1.0;
let offset = { x: 0, y: 0 };
let isDragging = false;
let startPos = null;
let currentPos = null;
let lastPinchDist = 0;

const G = 1; // 重力定数（シミュレーション用）

// 初期配置：中心に大きな太陽、周囲に惑星
function init() {
    window.addEventListener('resize', resize);
    resize();

    // 初期天体
    bodies.push(new Body(0, 0, 0, 0, 5000, '#ffcc00')); // 太陽
    bodies.push(new Body(200, 0, 0, 5, 10, '#44aaff')); // 地球っぽい
    bodies.push(new Body(-350, 0, 0, -3.8, 50, '#ff6600')); // 木星っぽい

    requestAnimationFrame(loop);
}

class Body {
    constructor(x, y, vx, vy, mass, color) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.mass = mass;
        this.color = color;
        this.radius = Math.max(3, Math.pow(mass, 1/3) * 2);
    }

    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }

    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(1, this.radius * zoom);

        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10 * zoom;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function loop() {
    const dt = parseFloat(timeInput.value);
    
    // 重力計算 (N-body)
    for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
            const b1 = bodies[i];
            const b2 = bodies[j];
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const distSq = dx*dx + dy*dy + 0.1; // ソフトニング
            const dist = Math.sqrt(distSq);
            const force = (G * b1.mass * b2.mass) / distSq;
            const ax = (force * dx / dist);
            const ay = (force * dy / dist);
            
            b1.vx += ax / b1.mass * dt;
            b1.vy += ay / b1.mass * dt;
            b2.vx -= ax / b2.mass * dt;
            b2.vy -= ay / b2.mass * dt;
        }
    }

    bodies.forEach(b => b.update(dt));

    // 描画
    ctx.fillStyle = '#00030a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    bodies.forEach(b => b.draw());

    // 太陽投下プレビュー（矢印）
    if (isDragging && startPos && currentPos) {
        ctx.beginPath();
        ctx.moveTo(startPos.x, startPos.y);
        ctx.lineTo(currentPos.x, currentPos.y);
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    requestAnimationFrame(loop);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

// タッチイベント処理
canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isDragging = true;
        startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        isDragging = false;
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        zoom *= (dist / lastPinchDist);
        zoom = Math.min(Math.max(zoom, 0.1), 10);
        lastPinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (isDragging && startPos && currentPos) {
        // スクリーン座標からシミュレーション座標へ変換
        const simX = (startPos.x - canvas.width / 2) / zoom + offset.x;
        const simY = (startPos.y - canvas.height / 2) / zoom + offset.y;
        
        // ベクトルの逆方向に飛ばす（パチンコ操作）
        const vx = (startPos.x - currentPos.x) * 0.1 / zoom;
        const vy = (startPos.y - currentPos.y) * 0.1 / zoom;
        
        bodies.push(new Body(simX, simY, vx, vy, parseInt(massInput.value), '#ffffff'));
    }
    isDragging = false;
    startPos = null;
});

init();
</script>
</body>
</html>
