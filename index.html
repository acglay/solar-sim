<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太陽系シミュレーター Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(20, 20, 30, 0.9); color: #fff;
            padding: 15px; border-radius: 15px; border: 1px solid #555;
            display: flex; flex-direction: column; gap: 12px;
            pointer-events: auto; max-width: 450px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-row { display: flex; gap: 10px; margin-top: 5px; }
        button {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            background: #444; color: white; font-weight: bold; cursor: pointer;
        }
        button:active { background: #666; }
        #pauseBtn { background: #cc7700; }
        #resetBtn { background: #aa2222; }
        label { font-size: 13px; white-space: nowrap; }
        input[type=range] { flex-grow: 1; accent-color: #ffcc00; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-panel">
    <div class="ui-row">
        <label>🌞 太陽の質量</label>
        <input type="range" id="massRange" min="500" max="10000" value="3000">
    </div>
    <div class="ui-row">
        <label>⏩ 進む速さ</label>
        <input type="range" id="timeRange" min="0" max="3" step="0.1" value="1">
    </div>
    <div class="btn-row">
        <button id="pauseBtn">一時停止/再開</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const massInput = document.getElementById('massRange');
const timeInput = document.getElementById('timeRange');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');

let bodies = [];
let zoom = 0.5; // 初期ズームを少し引いて全体を見やすく
let offset = { x: 0, y: 0 };
let isDragging = false;
let startPos = null;
let currentPos = null;
let lastPinchDist = 0;
let isPaused = false;

const G = 1; 

class Body {
    constructor(x, y, vx, vy, mass, color, trailLength = 100) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.mass = mass;
        this.color = color;
        this.radius = Math.max(2, Math.pow(mass, 1/3) * 1.5);
        this.history = []; // 軌跡用
        this.maxHistory = trailLength;
    }

    update(dt) {
        if (!isPaused) {
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > this.maxHistory) this.history.shift();
            this.x += this.vx * dt;
            this.y += this.vy * dt;
        }
    }

    draw() {
        // 軌跡の描画
        if (this.history.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = 0.3; // 薄く
            ctx.lineWidth = 1 * zoom;
            const startIdx = Math.max(0, this.history.length - 100);
            for (let i = startIdx; i < this.history.length; i++) {
                const p = this.history[i];
                const sx = (p.x - offset.x) * zoom + canvas.width / 2;
                const sy = (p.y - offset.y) * zoom + canvas.height / 2;
                if (i === startIdx) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        // 天体本体
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(1.5, this.radius * zoom);

        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function initSolarSystem() {
    bodies = [];
    // 太陽
    bodies.push(new Body(0, 0, 0, 0, 5000, '#ffcc00', 1));
    // 水星〜冥王星（距離と速度はゲームバランス優先の近似値）
    const planets = [
        { d: 80,  v: 8.0,  m: 5,   c: '#aaaaaa' }, // 水星
        { d: 130, v: 6.2,  m: 10,  c: '#ffddaa' }, // 金星
        { d: 190, v: 5.1,  m: 10,  c: '#44aaff' }, // 地球
        { d: 260, v: 4.4,  m: 8,   c: '#ff6644' }, // 火星
        { d: 450, v: 3.3,  m: 50,  c: '#ffcc99' }, // 木星
        { d: 650, v: 2.8,  m: 40,  c: '#eeddaa' }, // 土星
        { d: 850, v: 2.4,  m: 20,  c: '#aaffff' }, // 天王星
        { d: 1050,v: 2.1,  m: 20,  c: '#6666ff' }, // 海王星
        { d: 1250,v: 1.9,  m: 3,   c: '#ccbbbb' }  // 冥王星
    ];

    planets.forEach(p => {
        bodies.push(new Body(p.d, 0, 0, p.v, p.m, p.c, Math.floor(p.d * 1.5)));
    });
}

function loop() {
    const dt = parseFloat(timeInput.value);
    
    if (!isPaused) {
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const b1 = bodies[i];
                const b2 = bodies[j];
                const dx = b2.x - b1.x;
                const dy = b2.y - b1.y;
                const distSq = dx*dx + dy*dy + 10;
                const dist = Math.sqrt(distSq);
                const force = (G * b1.mass * b2.mass) / distSq;
                const ax = (force * dx / dist);
                const ay = (force * dy / dist);
                b1.vx += ax / b1.mass * dt;
                b1.vy += ay / b1.mass * dt;
                b2.vx -= ax / b2.mass * dt;
                b2.vy -= ay / b2.mass * dt;
            }
        }
    }

    bodies.forEach(b => b.update(dt));

    ctx.fillStyle = '#00030a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    bodies.forEach(b => b.draw());

    // 投下プレビュー
    if (isDragging && startPos && currentPos) {
        ctx.beginPath();
        ctx.moveTo(startPos.x, startPos.y);
        ctx.lineTo(currentPos.x, currentPos.y);
        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    requestAnimationFrame(loop);
}

// イベント
resetBtn.onclick = initSolarSystem;
pauseBtn.onclick = () => {
    isPaused = !isPaused;
    pauseBtn.style.background = isPaused ? "#0077cc" : "#cc7700";
};

canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isDragging = true;
        startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        isDragging = false;
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const delta = dist / lastPinchDist;
        zoom *= delta;
        zoom = Math.min(Math.max(zoom, 0.05), 5);
        lastPinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (isDragging && startPos && currentPos) {
        const simX = (startPos.x - canvas.width / 2) / zoom + offset.x;
        const simY = (startPos.y - canvas.height / 2) / zoom + offset.y;
        
        // 逆向きに実装：引っ張った方向に飛ばす
        const vx = (currentPos.x - startPos.x) * 0.05 / zoom;
        const vy = (currentPos.y - startPos.y) * 0.05 / zoom;
        
        const newSun = new Body(simX, simY, vx, vy, parseInt(massInput.value), '#ffffff', 200);
        bodies.push(newSun);
    }
    isDragging = false;
});

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
initSolarSystem();
requestAnimationFrame(loop);
</script>
</body>
</html>
