<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v7.3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version { position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4); font-size: 10px; pointer-events: none; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(10, 10, 25, 0.95); color: #fff;
            padding: 12px; border-radius: 16px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 500px; z-index: 100;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; flex: 1; font-size: 14px; }
        .icon-btn { font-size: 18px; padding: 8px; flex: 1; border: 1px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .small-reset-btn { flex: 0 0 40px; font-size: 14px; padding: 4px; background: #333; }
        input[type=range] { flex: 2; accent-color: #00b060; height: 6px; }
        label { white-space: nowrap; font-size: 11px; color: #aaa; min-width: 40px; }
    </style>
</head>
<body>
<div id="version">v7.3 Hybrid Orbit & Focus UI</div>
<canvas id="canvas"></canvas>
<div class="ui-panel" id="panel">
    <div class="ui-row"><select id="targetSelect"><option value="-1">🔭 自由視点</option></select></div>
    <div class="ui-row">
        <select id="physicsMode"><option value="collision">⚙️ 合体</option><option value="normal">⚙️ 透過</option></select>
        <select id="launchType">
            <option value="sun">☀️ 太陽</option><option value="mercury">☿️ 水星</option>
            <option value="venus">♀️ 金星</option><option value="earth" selected>🌍 地球</option>
            <option value="mars">♂️ 火星</option><option value="jupiter">♃ 木星</option>
            <option value="saturn">♄ 土星</option><option value="uranus">⛢ 天王星</option>
            <option value="neptune">♆ 海王星</option><option value="pluto">♇ 冥王星</option>
            <option value="blackhole">🕳️ ブラックホール</option>
        </select>
    </div>
    <div class="ui-row">
        <label id="massLabel">🌞 質量</label>
        <input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1">
        <button id="massResetBtn" class="small-reset-btn">↩️</button>
    </div>
    <div class="ui-row">
        <label>⏩ 時間</label>
        <input type="range" id="timeRange" min="0" max="10" step="0.1" value="1.5">
        <button id="timeResetBtn" class="small-reset-btn">↩️</button>
    </div>
    <div class="ui-row">
        <button id="pauseBtn" class="icon-btn">⏸️</button>
        <button id="resetBtn" class="icon-btn">🔄</button>
        <button id="randomBtn" class="icon-btn">🌌</button>
        <button id="labelBtn" class="icon-btn" style="background: #0060b0;">📛</button>
        <button id="debugBtn" class="icon-btn" style="background: #333;">🔍</button>
        <button id="precisionBtn" class="icon-btn" style="background: #00b060;">🎯</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');
let ui = {};
let bodies = [], zoom = 0.4, offset = { x: 0, y: 0 }, isDragging = false, startPos = null, currentMousePos = null, isPaused = false, bodyCounter = 0, showLabels = true, isHighPrecision = true, showDebug = false, lastPinchDist = 0;
const G = 1;

const PRESETS = {
    sun: { m: 1000000, c: '#ffcc00', n: "太陽", e: "☀️" },
    mercury: { m: 0.166, c: '#aaaaaa', n: "水星", e: "☿️" },
    venus: { m: 2.447, c: '#ffddaa', n: "金星", e: "♀️" },
    earth: { m: 3.003, c: '#44aaff', n: "地球", e: "🌍" },
    mars: { m: 0.322, c: '#ff6644', n: "火星", e: "♂️" },
    jupiter: { m: 954.7, c: '#ffcc99', n: "木星", e: "♃" },
    saturn: { m: 285.8, c: '#eeddaa', n: "土星", e: "♄", r: "h" },
    uranus: { m: 43.66, c: '#50c878', n: "天王星", e: "⛢", r: "v" },
    neptune: { m: 51.51, c: '#120a8f', n: "海王星", e: "♆" },
    pluto: { m: 0.006, c: '#ccbbbb', n: "冥王星", e: "♇" },
    blackhole: { m: 5000000, c: '#000', n: "ブラックホール", e: "🕳️" }
};

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ax = 0; this.ay = 0; this.mass = mass; 
        this.color = color; this.name = name; this.ringType = ringType; this.isMoon = isMoon;
        this.isBlackHole = (name === "ブラックホール");
        this.emoji = (Object.values(PRESETS).find(p => p.n === name) || {e: "🪐"}).e;
        
        // ハイブリッド軌道用
        this.isAnalytic = isMoon;
        this.parent = null;
        this.orbitDist = 0;
        this.angle = 0;
        
        this.updateRadius();
    }
    updateRadius() {
        const visualMass = this.isMoon ? this.mass * 12 : this.mass;
        this.radius = Math.max(1.5, Math.log10(this.mass + 1) * 8 * (this.isBlackHole ? 0.4 : (this.isMoon ? 0.6 : 2.5)));
    }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(0.5, this.radius * zoom);
        ctx.globalAlpha = this.isMoon ? Math.min(1.0, zoom * 2) : 1.0;
        
        if (this.isBlackHole) {
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill();
            ctx.beginPath(); ctx.arc(sx, sy, sr + 2, 0, Math.PI * 2); ctx.strokeStyle = "white"; ctx.stroke();
        } else {
            if (this.ringType === "h") {
                ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.8, sr * 0.8, 0.4, 0, Math.PI * 2); ctx.strokeStyle = "rgba(200, 180, 150, 0.4)"; ctx.lineWidth = 1 * zoom; ctx.stroke();
            } else if (this.ringType === "v") {
                ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.5, sr * 0.6, 1.4, 0, Math.PI * 2); ctx.strokeStyle = "rgba(180, 220, 255, 0.4)"; ctx.lineWidth = 1 * zoom; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
        }

        if (showLabels && (!this.isMoon || zoom > 0.5)) {
            // リーダー線付きラベル表示
            const lineLen = 20;
            ctx.beginPath(); ctx.moveTo(sx, sy - sr); ctx.lineTo(sx + lineLen, sy - sr - lineLen);
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = `${this.isMoon?9:11}px sans-serif`; ctx.textAlign = "left";
            ctx.fillText(this.name, sx + lineLen + 2, sy - sr - lineLen);
        }
        ctx.globalAlpha = 1.0;
    }
}

function computePhysics(bodyList, dt) {
    // 解析軌道の更新と物理切替
    bodyList.forEach(b => {
        if (b.isAnalytic && b.parent) {
            // ケプラーの第3法則に基づき角度を更新 ω = v/r = sqrt(G(M+m)/r^3)
            const omega = Math.sqrt((G * (b.parent.mass + b.mass)) / Math.pow(b.orbitDist, 3));
            b.angle += omega * dt;
            b.x = b.parent.x + Math.cos(b.angle) * b.orbitDist;
            b.y = b.parent.y + Math.sin(b.angle) * b.orbitDist;
            
            // ユーザー追加天体や他の惑星への近接判定
            bodyList.forEach(other => {
                if (other === b || other === b.parent) return;
                const dist = Math.sqrt(Math.pow(b.x - other.x, 2) + Math.pow(b.y - other.y, 2));
                if (dist < 40) { // 近接閾値
                    b.isAnalytic = false;
                    const vMag = Math.sqrt((G * (b.parent.mass + b.mass)) / b.orbitDist);
                    b.vx = b.parent.vx - Math.sin(b.angle) * vMag;
                    b.vy = b.parent.vy + Math.cos(b.angle) * vMag;
                }
            });
        }
    });

    const physicsBodies = bodyList.filter(b => !b.isAnalytic);
    physicsBodies.forEach(b => {
        b.x += b.vx * dt + 0.5 * b.ax * dt * dt;
        b.y += b.vy * dt + 0.5 * b.ay * dt * dt;
        b.oldAx = b.ax; b.oldAy = b.ay; b.ax = 0; b.ay = 0;
    });

    for (let i = 0; i < bodyList.length; i++) {
        const b1 = bodyList[i];
        for (let j = i + 1; j < bodyList.length; j++) {
            const b2 = bodyList[j];
            const dx = b2.x - b1.x, dy = b2.y - b1.y, d2 = dx*dx + dy*dy + 0.05, d = Math.sqrt(d2);
            const force = (G * b1.mass * b2.mass) / d2;
            if (!b1.isAnalytic) { b1.ax += (force * dx / d) / b1.mass; b1.ay += (force * dy / d) / b1.mass; }
            if (!b2.isAnalytic) { b2.ax -= (force * dx / d) / b2.mass; b2.ay -= (force * dy / d) / b2.mass; }
            
            if (i === 0 || j === 0) { // 簡易デバッグ用重力源
                const f = force / (b1.id===0?b2.mass:b1.mass);
                const targetB = (b1.id===0?b2:b1);
                if (f > targetB.maxForce || !targetB.maxForce) {
                    targetB.maxForce = f; targetB.strongestAttractorName = (b1.id===0?b1.name:b2.name);
                    targetB.attractorPos = {x: (b1.id===0?b1.x:b2.x), y: (b1.id===0?b1.y:b2.y)};
                }
            }
        }
    }
    physicsBodies.forEach(b => {
        b.vx += 0.5 * (b.oldAx + b.ax) * dt;
        b.vy += 0.5 * (b.oldAy + b.ay) * dt;
    });
}

function initSolarSystem() {
    bodyCounter = 0; bodies = [];
    const sun = new Body(0, 0, 0, 0, PRESETS.sun.m, PRESETS.sun.c, "太陽"); bodies.push(sun);
    const data = [
        [387, PRESETS.mercury.m, PRESETS.mercury.c, "水星", null, []],
        [723, PRESETS.venus.m, PRESETS.venus.c, "金星", null, []],
        [1000, PRESETS.earth.m, PRESETS.earth.c, "地球", null, [[25, 0.037, "#b0b0b0", "月"]]],
        [1524, PRESETS.mars.m, PRESETS.mars.c, "火星", null, [[15, 0.0001, "#b59e8a", "フォボス"], [22, 0.0001, "#9d8b7a", "ダイモス"]]],
        [5203, PRESETS.jupiter.m, PRESETS.jupiter.c, "木星", null, [[110, 0.45, "#e2d06e", "イオ"], [150, 0.40, "#a0a0a0", "エウロパ"], [200, 0.70, "#7a7a7a", "ガニメデ"]]],
        [9537, PRESETS.saturn.m, PRESETS.saturn.c, "土星", "h", [[250, 0.65, "#d2a01e", "タイタン"]]],
        [19191, PRESETS.uranus.m, PRESETS.uranus.c, "天王星", "v", []],
        [30069, PRESETS.neptune.m, PRESETS.neptune.c, "海王星", null, [[280, 0.10, "#90a0b0", "トリトン"]]]
    ];
    data.forEach(p => {
        const angle = Math.random() * Math.PI * 2;
        const vMag = Math.sqrt((G * (sun.mass + p[1])) / p[0]);
        const planet = new Body(Math.cos(angle)*p[0], Math.sin(angle)*p[0], -Math.sin(angle)*vMag, Math.cos(angle)*vMag, p[1], p[2], p[3], p[4], false);
        bodies.push(planet);
        p[5].forEach(m => {
            const moon = new Body(0, 0, 0, 0, m[1], m[2], m[3], null, true);
            moon.parent = planet; moon.orbitDist = m[0]; moon.angle = Math.random() * Math.PI * 2;
            bodies.push(moon);
        });
    });
    updateSelect();
}

function loop() {
    if (!ui.timeRange) return requestAnimationFrame(loop);
    const timeScale = parseFloat(ui.timeRange.value);
    if (!isPaused) {
        const subSteps = isHighPrecision ? 128 : 32;
        const dt = (timeScale * 0.5) / subSteps;
        for (let s = 0; s < subSteps; s++) computePhysics(bodies, dt);
        
        // 合体判定
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const b1 = bodies[i], b2 = bodies[j], dx = b2.x-b1.x, dy = b2.y-b1.y, d = Math.sqrt(dx*dx+dy*dy);
                if (d < (b1.radius + b2.radius) * 0.6) {
                    const s = b1.mass > b2.mass ? b1 : b2;
                    const v = b1.mass > b2.mass ? b2 : b1;
                    if (ui.physicsMode.value === 'collision') {
                        s.vx = (b1.vx*b1.mass + b2.vx*b2.mass)/(b1.mass+b2.mass);
                        s.vy = (b1.vy*b1.mass + b2.vy*b2.mass)/(b1.mass+b2.mass);
                        s.mass += v.mass; s.updateRadius(); bodies.splice(bodies.indexOf(v), 1); updateSelect(); j--; break;
                    }
                }
            }
        }
    }

    ctx.fillStyle = '#000208'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // ターゲットフォーカス (UI領域を避けた中央)
    const target = bodies.find(b => b.id === parseInt(ui.targetSelect.value));
    if (target) {
        const uiHeight = panel.offsetHeight;
        const visibleCenterY = (canvas.height - uiHeight) / 2;
        offset.x = target.x;
        offset.y = target.y - (canvas.height / 2 - visibleCenterY) / zoom;
    }

    bodies.forEach(b => b.draw());

    // 射出ガイド表示
    if (isDragging && startPos && currentMousePos) {
        ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(currentMousePos.x, currentMousePos.y);
        ctx.strokeStyle = "rgba(255, 255, 0, 0.5)"; ctx.lineWidth = 2; ctx.stroke();
    }
    requestAnimationFrame(loop);
}

// 事件 (Mouse & Touch)
function handleStart(x, y) { isDragging = true; startPos = { x, y }; currentMousePos = { x, y }; }
function handleMove(x, y) { 
    if (!isDragging) return;
    currentMousePos = { x, y };
    if (ui.targetSelect.value == "-1") {
        offset.x -= (x - startPos.x) / zoom; offset.y -= (y - startPos.y) / zoom;
        startPos = { x, y };
    }
}
function handleEnd(x, y) {
    if (isDragging && startPos && ui.targetSelect.value != "-1") {
        const sx = (startPos.x - canvas.width/2)/zoom + offset.x, sy = (startPos.y - canvas.height/2)/zoom + offset.y;
        const vx = (x - startPos.x) * 0.05 / zoom, vy = (y - startPos.y) * 0.05 / zoom;
        const config = PRESETS[ui.launchType.value];
        const m = (ui.launchType.value === 'sun' || ui.launchType.value === 'blackhole') ? config.m * parseFloat(ui.massRange.value) : config.m;
        bodies.push(new Body(sx, sy, vx, vy, m, config.c, config.n, config.r)); updateSelect();
    }
    isDragging = false; startPos = null;
}

canvas.onmousedown = (e) => handleStart(e.clientX, e.clientY);
window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
window.onmouseup = (e) => handleEnd(e.clientX, e.clientY);
canvas.onwheel = (e) => { e.preventDefault(); zoom *= (e.deltaY > 0 ? 0.8 : 1.25); zoom = Math.max(0.0001, Math.min(zoom, 100)); };

canvas.ontouchstart = (e) => { if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } };
canvas.ontouchmove = (e) => { e.preventDefault();
    if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (lastPinchDist > 0) { zoom *= (d / lastPinchDist); zoom = Math.max(0.0001, Math.min(zoom, 100)); }
        lastPinchDist = d;
    } };
canvas.ontouchend = (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);

function updateSelect() {
    if(!ui.targetSelect) return;
    const v = ui.targetSelect.value; ui.targetSelect.innerHTML = '<option value="-1">🔭 自由視点</option>';
    bodies.forEach(b => { const o = document.createElement('option'); o.value = b.id; o.textContent = b.emoji + " " + b.name; ui.targetSelect.appendChild(o); });
    ui.targetSelect.value = v;
}

window.onload = () => {
    ['targetSelect','physicsMode','launchType','massRange','timeRange','pauseBtn','resetBtn','randomBtn','labelBtn','precisionBtn','debugBtn','massResetBtn','timeResetBtn'].forEach(id => ui[id] = document.getElementById(id));
    ui.resetBtn.onclick = () => { initSolarSystem(); updateSelect(); };
    ui.pauseBtn.onclick = () => { isPaused = !isPaused; ui.pauseBtn.textContent = isPaused ? "▶️" : "⏸️"; };
    ui.labelBtn.onclick = () => { showLabels = !showLabels; ui.labelBtn.style.background = showLabels ? "#0060b0" : "#333"; };
    ui.debugBtn.onclick = () => { showDebug = !showDebug; ui.debugBtn.style.background = showDebug ? "#b0a000" : "#333"; };
    ui.precisionBtn.onclick = () => { isHighPrecision = !isHighPrecision; ui.precisionBtn.style.background = isHighPrecision ? "#00b060" : "#333"; };
    ui.launchType.onchange = () => { const s = (ui.launchType.value === 'sun' || ui.launchType.value === 'blackhole'); ui.massRange.disabled = !s; };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initSolarSystem(); loop();
};
</script>
</body>
</html>
