<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v4.3 - Advanced Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(5, 5, 20, 0.95); color: #fff;
            padding: 10px; border-radius: 12px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 6px;
            pointer-events: auto; max-width: 500px; font-size: 11px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        select, button {
            background: #111; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; flex: 1;
        }
        #pauseBtn { background: #b06000; }
        #resetBtn { background: #666; }
        #randomBtn { background: #4400aa; }
        input[type=range] { flex: 2; accent-color: #55aaff; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="ui-panel">
    <div class="ui-row">
        <label>🔭 視点</label>
        <select id="targetSelect"><option value="-1">自由視点</option></select>
        <label style="color:#5af">⭐ 進化</label>
        <select id="snMode"><option value="on">ON</option><option value="off">OFF</option></select>
        <button id="randomBtn">🌌 星系ガチャ</button>
    </div>
    <div class="ui-row">
        <label>⚙️ 物理</label>
        <select id="physicsMode"><option value="collision">合体</option><option value="normal">透過</option></select>
        <label>🚀 投入</label>
        <select id="launchType">
            <option value="sun">太陽</option><option value="earth" selected>地球</option>
            <option value="mercury">水星</option><option value="venus">金星</option>
            <option value="mars">火星</option><option value="jupiter">木木星</option>
            <option value="saturn">土星</option><option value="uranus">天王星</option>
            <option value="neptune">海王星</option><option value="pluto">冥王星</option>
        </select>
    </div>
    <div class="ui-row">
        <label>🌞 質量倍率</label>
        <input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1">
        <label>⏩ 速度</label>
        <input type="range" id="timeRange" min="0" max="3" step="0.1" value="1">
    </div>
    <div class="ui-row">
        <button id="pauseBtn">一時停止</button>
        <button id="resetBtn">宇宙リセット</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const targetSelect = document.getElementById('targetSelect'), snMode = document.getElementById('snMode'), physicsMode = document.getElementById('physicsMode'), launchType = document.getElementById('launchType'), massInput = document.getElementById('massRange'), timeInput = document.getElementById('timeRange'), pauseBtn = document.getElementById('pauseBtn'), resetBtn = document.getElementById('resetBtn'), randomBtn = document.getElementById('randomBtn');

let bodies = [], effects = [], zoom = 0.5, offset = { x: 0, y: 0 }, isDragging = false, startPos = null, currentPos = null, lastPinchDist = 0, lastMidPoint = null, isPaused = false, bodyCounter = 0, supernovaTimer = 0, supernovaActive = false, flashAlpha = 0, animFrame = 0;
const G = 1;

const PRESETS = {
    sun: { m: 20000, c: '#ffcc00', n: "太陽" }, mercury: { m: 0.1, c: '#aaaaaa', n: "水星" }, venus: { m: 0.8, c: '#ffddaa', n: "金星" }, earth: { m: 1, c: '#44aaff', n: "地球" }, mars: { m: 0.1, c: '#ff6644', n: "火星" }, jupiter: { m: 318, c: '#ffcc99', n: "木星" }, saturn: { m: 95, c: '#eeddaa', n: "土星", r: "h" }, uranus: { m: 14, c: '#aaffff', n: "天王星", r: "v" }, neptune: { m: 17, c: '#6666ff', n: "海王星" }, pluto: { m: 0.002, c: '#ccbbbb', n: "冥王星" }
};

const NAME_GEN = {
    p1: ["ゼウス", "アエテルナ", "ベスタ", "ノヴァ", "グリエーゼ", "ケプラー", "オシリス", "テラ", "ルナ", "ヘリオス"],
    p2: ["・プライム", "・ベータ", "・マギナ", "・オリジン", "・セカンド", "・ヴォイド", "・コア", "・環", "・零", "・極"]
};

function generateName() { return NAME_GEN.p1[Math.floor(Math.random()*NAME_GEN.p1.length)] + NAME_GEN.p2[Math.floor(Math.random()*NAME_GEN.p2.length)]; }

function lerpColor(c1, c2, f) {
    const r1 = parseInt(c1.substr(1, 2), 16), g1 = parseInt(c1.substr(3, 2), 16), b1 = parseInt(c1.substr(5, 2), 16);
    const r2 = parseInt(c2.substr(1, 2), 16), g2 = parseInt(c2.substr(3, 2), 16), b2 = parseInt(c2.substr(5, 2), 16);
    return `rgb(${Math.round(r1 + f * (r2 - r1))},${Math.round(g1 + f * (g2 - g1))},${Math.round(b1 + f * (b2 - b1))})`;
}

function getColorByMass(mass) {
    const colors = [{ m: 500, c: '#ff5533' }, { m: 5000, c: '#ffcc00' }, { m: 20000, c: '#ffffff' }, { m: 100000, c: '#88ccff' }];
    if (mass <= colors[0].m) return colors[0].c;
    if (mass >= colors[colors.length - 1].m) return colors[colors.length - 1].c;
    for (let i = 0; i < colors.length - 1; i++) {
        if (mass >= colors[i].m && mass < colors[i + 1].m) return lerpColor(colors[i].c, colors[i + 1].c, (mass - colors[i].m) / (colors[i + 1].m - colors[i].m));
    }
}

class SpaghettiPoint {
    constructor(x, y, vx, vy, color) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.life = 1.0; }
    update(bh, dt) {
        const dx = bh.x - this.x, dy = bh.y - this.y, d = Math.sqrt(dx*dx + dy*dy);
        const f = (G * bh.mass * 0.1) / (dx*dx+dy*dy + 1) * 20;
        this.vx += (f * dx / d) * dt; this.vy += (f * dy / d) * dt;
        this.x += this.vx * dt; this.y += this.vy * dt; this.life -= 0.01 * dt;
        return d > bh.radius && this.life > 0;
    }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2;
        ctx.fillStyle = this.color; ctx.globalAlpha = this.life; ctx.fillRect(sx, sy, 2 * zoom, 2 * zoom); ctx.globalAlpha = 1.0;
    }
}

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.mass = mass; this.color = color; this.name = name; this.ringType = ringType; this.history = []; this.spaghettiPoints = []; this.isBlackHole = false; this.updateRadius();
    }
    updateRadius() {
        this.radius = Math.max(1.2, Math.pow(this.mass, 1/3) * (this.isBlackHole ? 1.0 : 1.5));
        if (!this.isBlackHole && this.mass >= 500) this.color = getColorByMass(this.mass);
    }
    update(dt) { if (!isPaused) { this.history.push({x: this.x, y: this.y}); if (this.history.length > 40) this.history.shift(); this.x += this.vx * dt; this.y += this.vy * dt; } }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2, sr = Math.max(1, this.radius * zoom);
        if (this.isBlackHole) { this.drawGargantua(sx, sy, sr); return; }
        if (this.spaghettiPoints.length > 0) { this.spaghettiPoints.forEach(p => p.draw()); return; }
        if (this.ringType === "h") {
            ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.8, sr * 0.8, 0.4, 0, Math.PI * 2); ctx.strokeStyle = "rgba(200, 180, 150, 0.4)"; ctx.lineWidth = 2 * zoom; ctx.stroke();
        } else if (this.ringType === "v") {
            ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.5, sr * 0.6, 1.4, 0, Math.PI * 2); ctx.strokeStyle = "rgba(180, 220, 255, 0.4)"; ctx.lineWidth = 1 * zoom; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
    }
    drawGargantua(sx, sy, sr) {
        animFrame += 0.02; ctx.save();
        const glowGrad = ctx.createRadialGradient(sx, sy, sr, sx, sy, sr * 5);
        glowGrad.addColorStop(0, "rgba(255, 220, 100, 0.5)"); glowGrad.addColorStop(1, "rgba(255, 50, 0, 0)");
        ctx.beginPath(); ctx.ellipse(sx, sy, sr * 4, sr * 2, 0, 0, Math.PI * 2); ctx.fillStyle = glowGrad; ctx.fill();
        const diskGrad = ctx.createLinearGradient(sx - sr*5, sy, sx + sr*5, sy);
        diskGrad.addColorStop(0, "rgba(255, 100, 0, 0)"); diskGrad.addColorStop(0.5, "rgba(255, 255, 220, 0.9)"); diskGrad.addColorStop(1, "rgba(255, 100, 0, 0)");
        ctx.beginPath(); ctx.ellipse(sx, sy, sr * 5, sr * 0.5, Math.sin(animFrame * 0.3) * 0.05, 0, Math.PI * 2); ctx.strokeStyle = diskGrad; ctx.lineWidth = sr * 0.4; ctx.stroke();
        ctx.beginPath(); ctx.arc(sx, sy, sr * 1.1, 0, Math.PI * 2); ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke();
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill(); ctx.restore();
    }
}

class RingEffect { constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.life = 1.0; } draw() { this.life -= 0.03; const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2; ctx.beginPath(); ctx.arc(sx, sy, (1.0 - this.life) * 100 * zoom, 0, Math.PI * 2); ctx.strokeStyle = this.color; ctx.globalAlpha = this.life; ctx.lineWidth = 2; ctx.stroke(); ctx.globalAlpha = 1.0; } }

function addKeplerianBody(parent, dist, mass, color, name, ringType = null, isMoon = false) {
    const angle = Math.random() * Math.PI * 2;
    const x = parent.x + Math.cos(angle) * dist;
    const y = parent.y + Math.sin(angle) * dist;
    // v = sqrt(GM / r)
    const orbitalSpeed = Math.sqrt((G * parent.mass) / dist);
    const vx = parent.vx - Math.sin(angle) * orbitalSpeed;
    const vy = parent.vy + Math.cos(angle) * orbitalSpeed;
    const body = new Body(x, y, vx, vy, mass, color, name, ringType);
    bodies.push(body);
    return body;
}

function initSolarSystem() {
    bodyCounter = 0; supernovaActive = false; supernovaTimer = 0; bodies = [];
    const sun = new Body(0, 0, 0, 0, 20000, '#ffcc00', "太陽");
    bodies.push(sun);
    
    // 惑星[距離, 質量, 色, 名前, 輪, 衛星]
    const planets = [
        [150, 0.1, '#aaaaaa', "水星", null, []],
        [250, 0.8, '#ffddaa', "金星", null, []],
        [380, 1.0, '#44aaff', "地球", null, [[18, 0.01, "#ccc", "月"]]],
        [550, 0.1, '#ff6644', "火星", null, []],
        [1000, 318, '#ffcc99', "木星", null, [[40, 0.1, "#fcc", "イオ"], [55, 0.1, "#ccf", "エウロパ"], [75, 0.2, "#cfc", "ガニメデ"]]],
        [1500, 95, '#eeddaa', "土星", "h", [[100, 0.15, "#f96", "タイタン"]]],
        [2000, 14, '#aaffff', "天王星", "v", []],
        [2500, 17, '#6666ff', "海王星", null, [[80, 0.05, "#ddd", "トリトン"]]],
        [3000, 0.002, '#ccbbbb', "冥王星", null, []]
    ];

    planets.forEach(p => {
        const planet = addKeplerianBody(sun, p[0], p[1], p[2], p[3], p[4]);
        p[5].forEach(m => {
            addKeplerianBody(planet, m[0], m[1], m[2], m[3], null, true);
        });
    });
    zoom = 0.4; offset = { x: 0, y: 0 }; targetSelect.value = "-1"; updateSelect();
}

function generateRandomSystem() {
    bodyCounter = 0; supernovaActive = false; bodies = [];
    const isBinary = Math.random() < 0.2; // 20%
    const rotSpeedMod = 0.5 + Math.random() * 1.5; // 回転スピードのランダム性
    let centralMass = 0;

    if (isBinary) {
        if (Math.random() < 0.5) { // 重い恒星静止モード
            const sunA = new Body(0, 0, 0, 0, 25000, getColorByMass(25000), generateName());
            bodies.push(sunA);
            const sunB = addKeplerianBody(sunA, 250, 5000, getColorByMass(5000), generateName());
            centralMass = 30000;
        } else { // 共通重心モード
            const massA = 10000 + Math.random()*10000;
            const massB = 10000 + Math.random()*10000;
            const dist = 200;
            const v = Math.sqrt(G * (massA + massB) / dist) * 0.5;
            bodies.push(new Body(-dist/2, 0, 0, v * rotSpeedMod, massA, getColorByMass(massA), generateName()));
            bodies.push(new Body(dist/2, 0, 0, -v * rotSpeedMod, massB, getColorByMass(massB), generateName()));
            centralMass = massA + massB;
        }
    } else {
        const mass = 15000 + Math.random()*10000;
        bodies.push(new Body(0, 0, 0, 0, mass, getColorByMass(mass), generateName()));
        centralMass = mass;
    }

    const sun = bodies[0];
    for (let i = 0; i < 12; i++) {
        const d = 500 + Math.random() * 2500;
        const m = 0.1 + Math.pow(Math.random(), 3) * 500;
        const planet = addKeplerianBody(sun, d, m, `hsl(${Math.random()*360}, 70%, 60%)`, generateName());
        // たまに衛星
        if (Math.random() < 0.3) {
            addKeplerianBody(planet, 30 + Math.random()*50, 0.01 + Math.random()*0.1, "#eee", generateName());
        }
    }
    zoom = 0.3; offset = { x: 0, y: 0 }; targetSelect.value = "-1"; updateSelect();
}

function loop() {
    const dt = parseFloat(timeInput.value);
    if (!isPaused) {
        for (let i = 0; i < bodies.length; i++) {
            const b1 = bodies[i];
            if (b1.isBlackHole) {
                for (let j = 0; j < bodies.length; j++) {
                    if (i === j) continue; const b2 = bodies[j];
                    if (b2.spaghettiPoints.length > 0) {
                        b2.spaghettiPoints = b2.spaghettiPoints.filter(p => p.update(b1, dt));
                        if (b2.spaghettiPoints.length === 0) { bodies.splice(j, 1); updateSelect(); if (j < i) i--; j--; }
                        continue;
                    }
                    const dx = b1.x - b2.x, dy = b1.y - b2.y, d = Math.sqrt(dx*dx + dy*dy);
                    if (d < b1.radius * 3 && !b2.isBlackHole) {
                        for (let k = 0; k < 20; k++) { b2.spaghettiPoints.push(new SpaghettiPoint(b2.x + (Math.random()-0.5)*10, b2.y + (Math.random()-0.5)*10, b2.vx, b2.vy, b2.color)); }
                        continue;
                    }
                    const f = (G * b1.mass * b2.mass) / (dx*dx+dy*dy+10) * 15;
                    b2.vx += (f * dx / d) / b2.mass * dt; b2.vy += (f * dy / d) / b2.mass * dt;
                }
                if (bodies.length === 1) { flashAlpha = 1.0; initSolarSystem(); }
            } else {
                for (let j = i + 1; j < bodies.length; j++) {
                    const b2 = bodies[j]; if (b2.isBlackHole || b2.spaghettiPoints.length > 0) continue;
                    const dx = b2.x - b1.x, dy = b2.y - b1.y, d2 = dx*dx + dy*dy + 5, d = Math.sqrt(d2);
                    if (physicsMode.value === 'collision' && d < (b1.radius + b2.radius)) {
                        const totalM = b1.mass + b2.mass; b1.vx = (b1.vx*b1.mass + b2.vx*b2.mass)/totalM; b1.vy = (b1.vy*b1.mass + b2.vy*b2.mass)/totalM; b1.x = (b1.x*b1.mass + b2.x*b2.mass)/totalM; b1.y = (b1.y*b1.mass + b2.y*b2.mass)/totalM;
                        b1.mass = totalM; b1.updateRadius(); if (!b1.name.endsWith("系")) b1.name += "系"; bodies.splice(j, 1); updateSelect(); continue;
                    }
                    const f = (G * b1.mass * b2.mass) / d2; b1.vx += (f * dx / d) / b1.mass * dt; b1.vy += (f * dy / d) / b1.mass * dt; b2.vx -= (f * dx / d) / b2.mass * dt; b2.vy -= (f * dy / d) / b2.mass * dt;
                }
                if (snMode.value === "on" && !supernovaActive && b1.mass >= 100000) { supernovaActive = true; supernovaTimer = 15; }
            }
        }
    }
    if (supernovaActive && !isPaused) { supernovaTimer -= (1/60) * dt; if (supernovaTimer <= 0) { flashAlpha = 1.0; supernovaActive = false; let massiveBody = bodies.reduce((prev, current) => (prev.mass > current.mass) ? prev : current); massiveBody.isBlackHole = true; massiveBody.name = "ブラックホール"; massiveBody.updateRadius(); } }
    ctx.fillStyle = '#000208'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const target = bodies.find(b => b.id === parseInt(targetSelect.value)); if (target) { offset.x = target.x; offset.y = target.y; }
    bodies.forEach(b => { b.update(dt); b.draw(); }); effects = effects.filter(e => e.life > 0); effects.forEach(e => e.draw());
    if (supernovaActive) { ctx.fillStyle = "#ff4444"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center"; ctx.fillText("⚠️ 重力崩壊まで: " + supernovaTimer.toFixed(1) + "s", canvas.width/2, 50); }
    if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0,0,canvas.width, canvas.height); flashAlpha -= 0.05; }
    if (isDragging && startPos && currentPos) { ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(currentPos.x, currentPos.y); ctx.strokeStyle = '#ffff00'; ctx.stroke(); }
    requestAnimationFrame(loop);
}

function updateSelect() { const v = targetSelect.value; targetSelect.innerHTML = '<option value="-1">自由視点</option>'; bodies.forEach(b => { const o = document.createElement('option'); o.value = b.id; o.textContent = b.name; if(b.id==v) o.selected=true; targetSelect.appendChild(o); }); }
resetBtn.onclick = initSolarSystem; randomBtn.onclick = generateRandomSystem; pauseBtn.onclick = () => { isPaused = !isPaused; pauseBtn.textContent = isPaused ? "再開" : "一時停止"; };
canvas.addEventListener('touchstart', (e) => { if (e.touches.length === 1) { isDragging = true; startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; currentPos = startPos; } else if (e.touches.length === 2) { isDragging = false; lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastMidPoint = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 }; } }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (e.touches.length === 1 && isDragging) { currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } else if (e.touches.length === 2) { const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); zoom *= (d / lastPinchDist); zoom = Math.min(Math.max(zoom, 0.001), 20); lastPinchDist = d; if (targetSelect.value == "-1") { const m = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 }; offset.x -= (m.x - lastMidPoint.x)/zoom; offset.y -= (m.y - lastMidPoint.y)/zoom; lastMidPoint = m; } } }, { passive: false });
canvas.addEventListener('touchend', (e) => {
    if (isDragging && startPos && currentPos) {
        const sx = (startPos.x - canvas.width/2)/zoom + offset.x, sy = (startPos.y - canvas.height/2)/zoom + offset.y;
        const type = launchType.value, config = PRESETS[type], multiplier = parseFloat(massInput.value);
        bodies.push(new Body(sx, sy, (currentPos.x - startPos.x)*0.05/zoom, (currentPos.y - startPos.y)*0.05/zoom, config.m * multiplier, config.c, config.n, config.r)); updateSelect();
    }
    isDragging = false;
});
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
initSolarSystem(); requestAnimationFrame(loop);
</script>
</body>
</html>
