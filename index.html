<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator v6.3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        .ui-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(10, 10, 25, 0.95); color: #fff;
            padding: 12px; border-radius: 16px; border: 1px solid #444;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 500px; z-index: 100;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 6px; flex: 1; font-size: 14px; }
        .icon-btn { font-size: 18px; padding: 8px; flex: 1; border: 1px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .small-reset-btn { flex: 0 0 40px; font-size: 14px; padding: 4px; background: #333; }
        input[type=range] { flex: 2; accent-color: #00b060; height: 6px; }
        input[type=range]:disabled { opacity: 0.3; cursor: not-allowed; }
        label { white-space: nowrap; font-size: 11px; color: #aaa; min-width: 40px; }
        .disabled-label { color: #555; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="ui-panel">
    <div class="ui-row"><select id="targetSelect"><option value="-1">🔭 自由視点</option></select></div>
    <div class="ui-row">
        <select id="physicsMode"><option value="collision">⚙️ 合体</option><option value="normal">⚙️ 透過</option></select>
        <select id="launchType">
            <option value="earth" selected>🚀 地球</option><option value="sun">🚀 太陽</option>
            <option value="mercury">🚀 水星</option><option value="venus">🚀 金星</option>
            <option value="mars">🚀 火星</option><option value="jupiter">🚀 木星</option>
            <option value="saturn">🚀 土星</option><option value="uranus">🚀 天王星</option>
            <option value="neptune">🚀 海王星</option><option value="pluto">🚀 冥王星</option>
        </select>
    </div>
    <div class="ui-row">
        <label id="massLabel">🌞 質量</label>
        <input type="range" id="massRange" min="0.1" max="10" step="0.1" value="1">
        <button id="massResetBtn" class="small-reset-btn">↩️</button>
    </div>
    <div class="ui-row">
        <label>⏩ 時間</label>
        <input type="range" id="timeRange" min="0" max="10" step="0.1" value="1.5">
        <button id="timeResetBtn" class="small-reset-btn">↩️</button>
    </div>
    <div class="ui-row">
        <button id="pauseBtn" class="icon-btn">⏸️</button>
        <button id="resetBtn" class="icon-btn">🔄</button>
        <button id="randomBtn" class="icon-btn">🌌</button>
        <button id="snBtn" class="icon-btn" style="background: #b06000;">⭐</button>
        <button id="labelBtn" class="icon-btn" style="background: #0060b0;">📛</button>
        <button id="precisionBtn" class="icon-btn" style="background: #00b060;">🎯</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let ui = {};
let bodies = [], zoom = 0.4, offset = { x: 0, y: 0 }, isDragging = false, startPos = null, isPaused = false, bodyCounter = 0, showLabels = true, isHighPrecision = true;
const G = 1;

const PRESETS = {
    sun: { m: 50000, c: '#ffcc00', n: "太陽" },
    mercury: { m: 0.015, c: '#aaaaaa', n: "水星" },
    venus: { m: 0.12, c: '#ffddaa', n: "金星" },
    earth: { m: 0.15, c: '#44aaff', n: "地球" },
    mars: { m: 0.016, c: '#ff6644', n: "火星" },
    jupiter: { m: 50, c: '#ffcc99', n: "木星" },
    saturn: { m: 15, c: '#eeddaa', n: "土星", r: "h" },
    uranus: { m: 2.5, c: '#50c878', n: "天王星", r: "v" },
    neptune: { m: 3.0, c: '#120a8f', n: "海王星" },
    pluto: { m: 0.003, c: '#ccbbbb', n: "冥王星" }
};

class Body {
    constructor(x, y, vx, vy, mass, color, name, ringType = null, isMoon = false, isPreset = false) {
        this.id = bodyCounter++; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.mass = mass; 
        this.color = color; this.name = name; this.ringType = ringType; this.isMoon = isMoon; this.isPreset = isPreset;
        this.isBlackHole = false; this.updateRadius();
    }
    updateRadius() {
        const visualMass = this.isMoon ? this.mass * 12 : this.mass;
        this.radius = Math.max(0.8, Math.pow(visualMass, 1/3) * (this.isBlackHole ? 1.0 : (this.isMoon ? 0.6 : 1.8)));
    }
    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2, sy = (this.y - offset.y) * zoom + canvas.height / 2;
        const sr = Math.max(this.isMoon ? 0.2 : 1.0, this.radius * zoom);
        let alpha = this.isMoon ? Math.min(1.0, zoom * 1.5) : 1.0;
        ctx.globalAlpha = alpha;
        
        if (this.ringType === "h") {
            ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.8, sr * 0.8, 0.4, 0, Math.PI * 2); ctx.strokeStyle = `rgba(200, 180, 150, ${alpha * 0.4})`; ctx.lineWidth = 2 * zoom; ctx.stroke();
        } else if (this.ringType === "v") {
            ctx.beginPath(); ctx.ellipse(sx, sy, sr * 2.5, sr * 0.6, 1.4, 0, Math.PI * 2); ctx.strokeStyle = `rgba(180, 220, 255, ${alpha * 0.4})`; ctx.lineWidth = 1 * zoom; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();

        if (showLabels && (!this.isMoon || zoom > 0.8)) {
            ctx.fillStyle = "white"; ctx.font = `${this.isMoon?9:12}px sans-serif`; ctx.textAlign = "center"; ctx.fillText(this.name, sx, sy - sr - 5);
        }
        ctx.globalAlpha = 1.0;
    }
}

// 天体を円軌道上の初速を与えて生成する関数
function createOrbitingBody(parent, dist, mass, color, name, ringType = null, isMoon = false, isPreset = false) {
    const angle = Math.random() * Math.PI * 2;
    // 相対位置
    const rx = Math.cos(angle) * dist;
    const ry = Math.sin(angle) * dist;
    // 物理的に正しい初速の計算: v = sqrt(G * (M+m) / r)
    const vMag = Math.sqrt((G * (parent.mass + mass)) / dist);
    // 速度ベクトルは位置ベクトル (rx, ry) に対して垂直 (-ry, rx)
    const vx = parent.vx - (ry / dist) * vMag;
    const vy = parent.vy + (rx / dist) * vMag;

    return new Body(parent.x + rx, parent.y + ry, vx, vy, mass, color, name, ringType, isMoon, isPreset);
}

function updateSelect() {
    if(!ui.targetSelect) return;
    const currentVal = ui.targetSelect.value;
    ui.targetSelect.innerHTML = '<option value="-1">🔭 自由視点</option>';
    bodies.forEach(b => {
        const o = document.createElement('option');
        o.value = b.id; o.textContent = (b.isBlackHole ? "🕳️ " : "🪐 ") + b.name;
        ui.targetSelect.appendChild(o);
    });
    ui.targetSelect.value = currentVal;
}

function initSolarSystem() {
    bodyCounter = 0; bodies = [];
    const sun = new Body(0, 0, 0, 0, 50000, '#ffcc00', "太陽", null, false, false); 
    bodies.push(sun);

    // 惑星・衛星データの定義 [距離, 質量, 色, 名前, 輪, 衛星リスト]
    const data = [
        [200, 0.015, '#aaaaaa', "水星", null, []],
        [350, 0.12, '#ffddaa', "金星", null, []],
        [500, 0.15, '#44aaff', "地球", null, [[18, 0.005, "#b0b0b0", "月"]]],
        [750, 0.016, '#ff6644', "火星", null, [[12, 0.001, "#b59e8a", "フォボス"], [18, 0.0008, "#9d8b7a", "ダイモス"]]],
        [1200, 50, '#ffcc99', "木星", null, [[40, 0.5, "#e2d06e", "イオ"], [58, 0.5, "#a0a0a0", "エウロパ"], [80, 0.8, "#7a7a7a", "ガニメデ"]]],
        [1800, 15, '#eeddaa', "土星", "h", [[105, 0.5, "#d2a01e", "タイタン"]]],
        [2400, 2.5, '#50c878', "天王星", "v", []],
        [3000, 3.0, '#120a8f', "海王星", null, [[95, 0.4, "#90a0b0", "トリトン"]]]
    ];

    data.forEach(p => {
        const planet = createOrbitingBody(sun, p[0], p[1], p[2], p[3], p[4], false, true);
        bodies.push(planet);
        p[5].forEach(m => {
            bodies.push(createOrbitingBody(planet, m[0], m[1], m[2], m[3], null, true, false));
        });
    });
}

function handleUniversalReset(isRandom = false) {
    const currentId = parseInt(ui.targetSelect.value);
    const savedName = (bodies.find(b => b.id === currentId) || {}).name;

    if(isRandom) {
        bodyCounter = 0; bodies = [];
        const sun = new Body(0, 0, 0, 0, 40000 + Math.random()*20000, '#fff', "主星"); bodies.push(sun);
        for (let i = 0; i < 12; i++) {
            const mass = 0.1 + Math.random()*10;
            const dist = 600 + Math.random()*2500;
            bodies.push(createOrbitingBody(sun, dist, mass, `hsl(${Math.random()*360},70%,60%)`, "惑星" + (i+1)));
        }
    } else { initSolarSystem(); }

    updateSelect();
    if (savedName) {
        const newTarget = bodies.find(b => b.name === savedName);
        if (newTarget) ui.targetSelect.value = newTarget.id;
    }
}

function loop() {
    if (!ui.timeRange) return requestAnimationFrame(loop);
    const timeScale = parseFloat(ui.timeRange.value);
    
    if (!isPaused) {
        const subSteps = isHighPrecision ? 128 : 32;
        const dt = (timeScale * 0.4) / subSteps;

        for (let s = 0; s < subSteps; s++) {
            // 1. 加速度の計算
            for (let i = 0; i < bodies.length; i++) {
                const b1 = bodies[i];
                for (let j = i + 1; j < bodies.length; j++) {
                    const b2 = bodies[j];
                    const dx = b2.x - b1.x, dy = b2.y - b1.y;
                    const d2 = dx*dx + dy*dy + 0.1;
                    const d = Math.sqrt(d2);
                    const f = (G * b1.mass * b2.mass) / d2;
                    const ax = (f * dx / d), ay = (f * dy / d);
                    // 2. 速度の更新 (Semi-implicit Euler)
                    b1.vx += ax / b1.mass * dt; b1.vy += ay / b1.mass * dt;
                    b2.vx -= ax / b2.mass * dt; b2.vy -= ay / b2.mass * dt;
                }
            }
            // 3. 位置の更新
            bodies.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
        }

        // 衝突判定 (描画フレームごとに1回)
        if (ui.physicsMode.value === 'collision') {
            for (let i = 0; i < bodies.length; i++) {
                for (let j = i + 1; j < bodies.length; j++) {
                    const b1 = bodies[i], b2 = bodies[j];
                    const dx = b2.x-b1.x, dy = b2.y-b1.y, d = Math.sqrt(dx*dx+dy*dy);
                    if (d < (b1.radius + b2.radius)) {
                        const m = b1.mass + b2.mass;
                        b1.vx = (b1.vx*b1.mass + b2.vx*b2.mass)/m; b1.vy = (b1.vy*b1.mass + b2.vy*b2.mass)/m;
                        b1.mass = m; b1.updateRadius(); bodies.splice(j, 1); updateSelect(); j--;
                    }
                }
            }
        }
    }

    ctx.fillStyle = '#000208'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const target = bodies.find(b => b.id === parseInt(ui.targetSelect.value));
    if (target) { offset.x = target.x; offset.y = target.y; }
    bodies.forEach(b => b.draw());
    requestAnimationFrame(loop);
}

// イベントリスナー
canvas.onmousedown = (e) => { isDragging = true; startPos = { x: e.clientX, y: e.clientY }; };
window.onmousemove = (e) => {
    if (!isDragging) return;
    const dx = (e.clientX - startPos.x) / zoom;
    const dy = (e.clientY - startPos.y) / zoom;
    if (ui.targetSelect.value == "-1") { offset.x -= dx; offset.y -= dy; }
    startPos = { x: e.clientX, y: e.clientY };
};
window.onmouseup = () => isDragging = false;
canvas.onwheel = (e) => { e.preventDefault(); zoom *= (e.deltaY > 0 ? 0.9 : 1.1); zoom = Math.max(0.001, Math.min(zoom, 100)); };

window.onload = () => {
    ['targetSelect','physicsMode','launchType','massRange','timeRange','pauseBtn','resetBtn','randomBtn','snBtn','labelBtn','precisionBtn','massResetBtn','timeResetBtn'].forEach(id => ui[id] = document.getElementById(id));
    
    ui.resetBtn.onclick = () => handleUniversalReset(false);
    ui.randomBtn.onclick = () => handleUniversalReset(true);
    ui.pauseBtn.onclick = () => { isPaused = !isPaused; ui.pauseBtn.textContent = isPaused ? "▶️" : "⏸️"; };
    ui.massResetBtn.onclick = () => ui.massRange.value = 1;
    ui.timeResetBtn.onclick = () => ui.timeRange.value = 1.5;
    
    ui.launchType.onchange = () => {
        const isSun = ui.launchType.value === 'sun';
        ui.massRange.disabled = !isSun;
        document.getElementById('massLabel').style.color = isSun ? '#aaa' : '#444';
    };

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initSolarSystem();
    updateSelect();
    loop();
};
</script>
</body>
</html>
