<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙物理学シミュレーター v2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            background: rgba(20, 20, 30, 0.95); color: #fff;
            padding: 12px; border-radius: 12px; border: 1px solid #555;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; max-width: 480px; font-size: 12px;
        }
        .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        select, button {
            background: #333; color: #fff; border: 1px solid #666; padding: 6px; border-radius: 6px; flex: 1;
        }
        #pauseBtn { background: #cc7700; }
        #resetBtn { background: #aa2222; }
        input[type=range] { flex: 2; accent-color: #ffcc00; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-panel">
    <div class="ui-row">
        <label>🔭 視点固定</label>
        <select id="targetSelect"><option value="-1">自由視点</option></select>
    </div>
    <div class="ui-row">
        <label>💥 物理</label>
        <select id="physicsMode">
            <option value="normal">すり抜け</option>
            <option value="collision">衝突・合体</option>
        </select>
    </div>
    <div class="ui-row">
        <label>🌞 質量</label>
        <input type="range" id="massRange" min="500" max="10000" value="3000">
        <label>⏩ 速度</label>
        <input type="range" id="timeRange" min="0" max="3" step="0.1" value="1">
    </div>
    <div class="ui-row">
        <button id="pauseBtn">一時停止</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const targetSelect = document.getElementById('targetSelect');
const physicsMode = document.getElementById('physicsMode');
const massInput = document.getElementById('massRange');
const timeInput = document.getElementById('timeRange');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');

let bodies = [];
let effects = [];
let zoom = 0.5;
let offset = { x: 0, y: 0 };
let isDragging = false;
let startPos = null;
let currentPos = null;
let lastPinchDist = 0;
let isPaused = false;
let bodyCounter = 0;

const G = 1;

class Body {
    constructor(x, y, vx, vy, mass, color, name = "天体") {
        this.id = bodyCounter++;
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.mass = mass;
        this.color = color;
        this.name = name;
        this.updateRadius();
        this.history = [];
    }

    updateRadius() {
        this.radius = Math.max(2, Math.pow(this.mass, 1/3) * 1.5);
    }

    update(dt) {
        if (!isPaused) {
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > 150) this.history.shift();
            this.x += this.vx * dt;
            this.y += this.vy * dt;
        }
    }

    draw() {
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;

        if (this.history.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = 0.2;
            ctx.lineWidth = 1 * zoom;
            for (let i = 0; i < this.history.length; i++) {
                const p = this.history[i];
                const px = (p.x - offset.x) * zoom + canvas.width / 2;
                const py = (p.y - offset.y) * zoom + canvas.height / 2;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        const sr = Math.max(1.5, this.radius * zoom);
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

class RingEffect {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.life = 1.0;
    }
    draw() {
        this.life -= 0.02;
        const sx = (this.x - offset.x) * zoom + canvas.width / 2;
        const sy = (this.y - offset.y) * zoom + canvas.height / 2;
        ctx.beginPath();
        ctx.arc(sx, sy, (1.0 - this.life) * 100 * zoom, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.stroke();
        ctx.globalAlpha = 1.0;
    }
}

function updateSelect() {
    const currentVal = targetSelect.value;
    targetSelect.innerHTML = '<option value="-1">自由視点</option>';
    bodies.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = b.name;
        if (b.id == currentVal) opt.selected = true;
        targetSelect.appendChild(opt);
    });
}

function initSolarSystem() {
    bodyCounter = 0;
    bodies = [
        new Body(0, 0, 0, 0, 5000, '#ffcc00', "太陽"),
        new Body(80, 0, 0, 8.0, 5, '#aaaaaa', "水星"),
        new Body(130, 0, 0, 6.2, 10, '#ffddaa', "金星"),
        new Body(190, 0, 0, 5.1, 10, '#44aaff', "地球"),
        new Body(260, 0, 0, 4.4, 8, '#ff6644', "火星"),
        new Body(450, 0, 0, 3.3, 50, '#ffcc99', "木星"),
        new Body(650, 0, 0, 2.8, 40, '#eeddaa', "土星"),
        new Body(850, 0, 0, 2.4, 20, '#aaffff', "天王星"),
        new Body(1050, 0, 0, 2.1, 20, '#6666ff', "海王星")
    ];
    updateSelect();
}

function loop() {
    const dt = parseFloat(timeInput.value);
    
    if (!isPaused) {
        // 重力 & 衝突判定
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const b1 = bodies[i]; const b2 = bodies[j];
                const dx = b2.x - b1.x; const dy = b2.y - b1.y;
                const d2 = dx*dx + dy*dy + 5;
                const d = Math.sqrt(d2);

                if (physicsMode.value === 'collision' && d < (b1.radius + b2.radius)) {
                    // 合体処理
                    const totalM = b1.mass + b2.mass;
                    b1.vx = (b1.vx * b1.mass + b2.vx * b2.mass) / totalM;
                    b1.vy = (b1.vy * b1.mass + b2.vy * b2.mass) / totalM;
                    b1.x = (b1.x * b1.mass + b2.x * b2.mass) / totalM;
                    b1.y = (b1.y * b1.mass + b2.y * b2.mass) / totalM;
                    b1.mass = totalM;
                    b1.updateRadius();
                    b1.name = b1.name + "系";
                    effects.push(new RingEffect(b1.x, b1.y, "#fff"));
                    bodies.splice(j, 1);
                    updateSelect();
                    continue;
                }

                const f = (G * b1.mass * b2.mass) / d2;
                b1.vx += (f * dx / d) / b1.mass * dt;
                b1.vy += (f * dy / d) / b1.mass * dt;
                b2.vx -= (f * dx / d) / b2.mass * dt;
                b2.vy -= (f * dy / d) / b2.mass * dt;
            }
        }
    }

    // 視点追従
    const targetId = parseInt(targetSelect.value);
    const target = bodies.find(b => b.id === targetId);
    if (target) { offset.x = target.x; offset.y = target.y; }

    bodies.forEach(b => b.update(dt));
    ctx.fillStyle = '#00030a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    bodies.forEach(b => b.draw());
    effects = effects.filter(e => e.life > 0);
    effects.forEach(e => e.draw());

    if (isDragging && startPos && currentPos) {
        ctx.beginPath();
        ctx.moveTo(startPos.x, startPos.y);
        ctx.lineTo(currentPos.x, currentPos.y);
        ctx.strokeStyle = '#ffff00';
        ctx.stroke();
    }
    requestAnimationFrame(loop);
}

resetBtn.onclick = initSolarSystem;
pauseBtn.onclick = () => { isPaused = !isPaused; pauseBtn.textContent = isPaused ? "再開" : "一時停止"; };

canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isDragging = true;
        startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        isDragging = false;
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        currentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (targetSelect.value == "-1") { // 自由視点の時だけスクロール
            offset.x -= (currentPos.x - startPos.x) / zoom * 0.1;
            offset.y -= (currentPos.y - startPos.y) / zoom * 0.1;
        }
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        zoom *= (dist / lastPinchDist);
        zoom = Math.min(Math.max(zoom, 0.01), 10);
        lastPinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (isDragging && startPos && currentPos) {
        const simX = (startPos.x - canvas.width / 2) / zoom + offset.x;
        const simY = (startPos.y - canvas.height / 2) / zoom + offset.y;
        const vx = (currentPos.x - startPos.x) * 0.05 / zoom;
        const vy = (currentPos.y - startPos.y) * 0.05 / zoom;
        const newSun = new Body(simX, simY, vx, vy, parseInt(massInput.value), '#fff', "新天体");
        bodies.push(newSun);
        updateSelect();
    }
    isDragging = false;
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
initSolarSystem();
requestAnimationFrame(loop);
</script>
</body>
</html>
